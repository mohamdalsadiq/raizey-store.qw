<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كلمة سر جديدة — RAIZEY STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">RAIZEY <span>STORE</span></div>
    <h1 class="auth-title">تعيين كلمة سر جديدة</h1>
    <p class="auth-sub">أدخل كلمة السر الجديدة لحسابك</p>

    <div class="field">
      <label>كلمة السر الجديدة</label>
      <input type="password" id="newPassword" minlength="8" placeholder="8 أحرف على الأقل">
    </div>

    <div class="field">
      <label>تأكيد كلمة السر</label>
      <input type="password" id="confirmPassword" placeholder="أعد كتابة كلمة السر">
    </div>

    <div class="form-error" id="formError"></div>
    <div class="form-success" id="formSuccess"></div>

    <button class="auth-btn" id="submitBtn">حفظ كلمة السر الجديدة</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
document.getElementById('submitBtn').addEventListener('click', async () => {
  const errorBox = document.getElementById('formError');
  const successBox = document.getElementById('formSuccess');
  errorBox.textContent = '';
  successBox.textContent = '';

  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (newPassword.length < 8) {
    errorBox.textContent = 'كلمة السر لازم تكون 8 أحرف على الأقل';
    return;
  }
  if (newPassword !== confirmPassword) {
    errorBox.textContent = 'كلمة السر غير متطابقة';
    return;
  }

  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) {
    errorBox.textContent = 'الرابط منتهي الصلاحية، اطلب رابط جديد من صفحة تسجيل الدخول';
    return;
  }

  const { error } = await supabaseClient.auth.updateUser({ password: newPassword });

  if (error) {
    errorBox.textContent = 'حصل خطأ، حاول تاني';
    return;
  }

  successBox.textContent = 'تم تغيير كلمة السر بنجاح، جارِ تحويلك...';
  setTimeout(() => { window.location.href = 'index.html'; }, 2000);
});
</script>
</body>
</html>
