<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تفاصيل المنتج — RAIZEY STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<!-- 🌐 إضافة مكتبة الأيقونات الاحترافية -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/auth.css">

<style>
  .product-header-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding: 0 4px;
  }
  .cart-badge-link {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #141414;
    border: 1px solid #222;
    padding: 8px 14px;
    border-radius: 20px;
    color: #ffffff;
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
    transition: 0.2s;
  }
  .cart-badge-link:hover {
    border-color: #2bed33;
  }
  .cart-badge-link i {
    color: #2bed33;
    font-size: 14px;
  }
  .cart-badge-link span {
    background: #2bed33;
    color: #000;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 11px;
  }
  .btn-secondary-cart {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Tajawal', sans-serif;
    cursor: pointer;
    margin-top: 10px;
    margin-bottom: 25px;
    background: #141414;
    border: 1px solid #2bed33;
    color: #2bed33;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s ease;
  }
  .btn-secondary-cart i {
    font-size: 16px;
  }
  .btn-secondary-cart:active {
    transform: scale(0.98);
    background: rgba(43, 237, 51, 0.1);
  }
  
  .payment-option.disabled {
    pointer-events: auto !important; 
    cursor: pointer !important;
  }
  .recharge-highlight-link {
    color: #2bed33 !important;
    font-weight: 800 !important;
    text-decoration: underline !important;
    margin-right: 4px;
    display: inline-block;
  }

  /* ستايل صندوق الشرح والتنبيهات المخصص الجديد */
  .product-instructions-box {
    background: #141414; 
    border: 1px solid #222; 
    border-left: 4px solid #2bed33; 
    padding: 16px; 
    border-radius: 10px; 
    margin-bottom: 25px; 
    font-size: 14px; 
    line-height: 1.6; 
    color: #e0e0e0; 
    white-space: pre-line;
  }
  .product-instructions-title {
    color: #2bed33; 
    display: flex; 
    align-items: center; 
    gap: 8px; 
    margin-bottom: 8px; 
    font-size: 15px;
    font-weight: 700;
  }
  .file-upload i {
    font-size: 16px;
    margin-left: 6px;
  }
</style>
</head>
<body>

<div class="product-page" id="productPage">
  <div class="product-header-actions">
    <a href="index.html" class="back-link" style="margin-bottom: 0;"><i class="fas fa-arrow-right"></i> رجوع للمتجر</a>
    <a href="cart.html" class="cart-badge-link">
      <i class="fas fa-shopping-cart"></i> السلة <span id="globalCartCount">0</span>
    </a>
  </div>

  <div id="loadingBox" style="text-align:center; padding:60px 0; color:var(--text-muted);">جارِ التحميل...</div>
  <div id="content" style="display:none;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const productId = params.get('id');
let currentUser = null;
let product = null;
let walletBalance = 0;
let paymentMethods = [];
let selectedPayment = null;
let selectedMethodId = null;
let receiptFile = null;
let appliedCoupon = null;
let welcomeDiscount = null;

function updateCartBadgeGlobal() {
  const cart = JSON.parse(localStorage.getItem('raizey_store_cart')) || [];
  document.getElementById('globalCartCount').textContent = cart.length;
}

async function init() {
  updateCartBadgeGlobal();
  if (!productId) { window.location.href = 'index.html'; return; }

  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) {
    sessionStorage.setItem('redirect_after_login', window.location.href);
    window.location.href = 'login.html';
    return;
  }
  currentUser = session.user;

  const rate = await getExchangeRate();

  const { data: p, error } = await supabaseClient
    .from('products')
    .select('*')
    .eq('id', productId)
    .single();

  if (error || !p) {
    document.getElementById('loadingBox').textContent = 'المنتج غير موجود';
    return;
  }
  product = { ...p, price_sdg: p.price_usd * rate };

  const { data: wallet } = await supabaseClient
    .from('wallets')
    .select('balance')
    .eq('user_id', currentUser.id)
    .single();
  walletBalance = wallet ? wallet.balance : 0;

  const { data: myProfile } = await supabaseClient
    .from('profiles')
    .select('referred_by, referral_discount_used')
    .eq('id', currentUser.id)
    .single();

  if (myProfile && myProfile.referred_by && !myProfile.referral_discount_used) {
    const { data: discountRow } = await supabaseClient
      .from('settings').select('value').eq('key', 'referral_signup_discount_percent').single();
    welcomeDiscount = discountRow ? parseFloat(discountRow.value) : 0;
  }

  const { data: methods } = await supabaseClient
    .from('payment_methods')
    .select('*')
    .eq('is_active', true);
  paymentMethods = methods || [];

  render();
}

function render() {
  document.getElementById('loadingBox').style.display = 'none';
  const content = document.getElementById('content');
  content.style.display = 'block';

  const fields = product.required_fields || [];
  const canUseWallet = walletBalance >= product.price_sdg;

  content.innerHTML = `
    <div class="product-hero">
      <div class="product-hero-thumb">
        ${product.image_url ? `<img src="${product.image_url}" alt="${product.name}">` : 'لا توجد صورة'}
      </div>
      <div class="product-hero-info">
        <h1>${product.name}</h1>
        <div class="product-hero-price">${formatSDG(product.price_sdg)} ج.س</div>
      </div>
    </div>

    <!-- عرض شرح المنتج والتنبيهات وطريقة الاستلام بالأيقونة الاحترافية -->
    ${product.instructions ? `
      <div class="product-instructions-box">
        <div class="product-instructions-title">
          <i class="fas fa-circle-info"></i> تفاصيل وطريقة استلام المنتج:
        </div>
        ${product.instructions}
      </div>
    ` : ''}

    ${fields.length > 0 ? `
      <div class="section-label">بيانات الطلب</div>
      ${fields.map(f => {
        const placeholderText = f.placeholder ? f.placeholder : `اكتب ${f.label} هنا...`;
        return `
          <div class="field">
            <label>${f.label}</label>
            <input type="text" data-field-key="${f.key}" required placeholder="${placeholderText}">
          </div>
        `;
      }).join('')}
    ` : ''}

    <button class="btn-secondary-cart" id="addToCartBtn">
      <i class="fas fa-cart-plus"></i> إضافة إلى سلة المشتريات
    </button>

    <div style="border-top: 1px dashed #222; margin: 25px 0;"></div>

    <div class="section-label">أو شراء مباشر الآن</div>

    <div class="payment-option ${!canUseWallet ? 'disabled' : ''}" id="walletOption">
      <div class="payment-option-info">
        <div class="payment-option-title">الدفع من المحفظة</div>
        <div class="payment-option-sub">
          ${canUseWallet
            ? `رصيدك الحالي: ${formatSDG(walletBalance)} ج.س`
            : `رصيدك غير كافٍ (${formatSDG(walletBalance)} ج.س) — <a href="wallet.html" class="recharge-highlight-link">اشحن المحفظة</a>`}
        </div>
      </div>
    </div>

    <div class="payment-option" id="bankOption">
      <div class="payment-option-info">
        <div class="payment-option-title">تحويل بنكك ورفع الإيصال</div>
        <div class="payment-option-sub">ادفع مباشرة وارفع صورة التحويل</div>
      </div>
    </div>

    <div class="bank-details" id="bankDetails">
      ${paymentMethods.map(m => `
        <div style="margin-bottom:10px;">
          <strong>${m.name}:</strong> ${m.account_info}
          ${m.instructions ? `<br><span style="color:var(--text-muted);">${m.instructions}</span>` : ''}
        </div>
      `).join('')}

      <div class="field" style="margin-top:12px;">
        <label>اختر وسيلة التحويل</label>
        <select id="methodSelect">
          <option value="">-- اختر --</option>
          ${paymentMethods.map(m => `<option value="${m.id}">${m.name}</option>`).join('')}
        </select>
      </div>

      <div class="file-upload" id="fileUploadBox">
        <i class="fas fa-paperclip"></i> اضغط لرفع صورة الإيصال
        <input type="file" id="receiptInput" accept="image/*" style="display:none;">
      </div>
    </div>

    ${welcomeDiscount ? `
      <div style="background:rgba(43,237,51,0.1); border:1px solid var(--primary); border-radius:10px; padding:10px 14px; margin-bottom:16px; font-size:13px; color:var(--primary); font-weight:700;">
        خصم ترحيبي ${welcomeDiscount}% مطبق تلقائياً على أول طلب ليك
      </div>
    ` : ''}

    <div class="section-label">هل لديك كود خصم؟</div>
    <div style="display:flex; gap:8px; margin-bottom:6px;">
      <input type="text" id="couponInput" placeholder="اكتب الكود هنا" style="flex:1; padding:12px 14px; border-radius:10px; border:1px solid var(--border); background:var(--bg); color:var(--white); font-family:var(--font-display); font-size:14px;">
      <button id="applyCouponBtn" style="padding:0 18px; border-radius:10px; background:var(--bg-card); border:1px solid var(--border); color:var(--white); font-weight:700; font-size:13px;">تطبيق</button>
    </div>
    <div id="couponMessage" style="font-size:12px; margin-bottom:16px;"></div>

    <div class="summary-box">
      <span>الإجمالي للشراء المباشر</span>
      <span class="total" id="summaryTotal">${formatSDG(currentPrice())} ج.س</span>
    </div>

    <div class="form-error" id="formError"></div>

    <button class="auth-btn" id="submitBtn">تأكيد الطلب المباشر</button>
  `;

  attachEvents(canUseWallet);
}

function attachEvents(canUseWallet) {
  const walletOption = document.getElementById('walletOption');
  const bankOption = document.getElementById('bankOption');
  const bankDetails = document.getElementById('bankDetails');
  const fileBox = document.getElementById('fileUploadBox');
  const fileInput = document.getElementById('receiptInput');
  const errorBox = document.getElementById('formError');
  const submitBtn = document.getElementById('submitBtn');
  const addToCartBtn = document.getElementById('addToCartBtn');

  addToCartBtn.addEventListener('click', () => {
    errorBox.textContent = '';
    const fieldValues = collectFieldValues();
    
    if (fieldValues === null) {
      errorBox.style.color = 'var(--danger)';
      errorBox.textContent = 'من فضلك املأ الحقول المطلوبة أولاً!';
      return;
    }

    let cart = JSON.parse(localStorage.getItem('raizey_store_cart')) || [];

    const cartItem = {
      cart_item_id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
      product_id: product.id,
      name: product.name,
      price_sdg: product.price_sdg,
      image_url: product.image_url,
      field_values: fieldValues
    };

    cart.push(cartItem);
    localStorage.setItem('raizey_store_cart', JSON.stringify(cart));
    
    updateCartBadgeGlobal();

    errorBox.style.color = 'var(--primary)';
    errorBox.textContent = 'تم إضافة المنتج بنجاح إلى السلة!';
    addToCartBtn.innerHTML = '<i class="fas fa-check-circle"></i> تم الإضافة بنجاح!';
    
    setTimeout(() => {
      addToCartBtn.innerHTML = '<i class="fas fa-cart-plus"></i> إضافة إلى سلة المشتريات';
      errorBox.textContent = '';
    }, 2500);
  });

  if (canUseWallet) {
    walletOption.addEventListener('click', () => {
      selectedPayment = 'wallet';
      walletOption.classList.add('selected');
      bankOption.classList.remove('selected');
      bankDetails.classList.remove('show');
    });
  } else {
    walletOption.addEventListener('click', () => {
      window.location.href = 'wallet.html';
    });
  }

  bankOption.addEventListener('click', () => {
    selectedPayment = 'bank';
    bankOption.classList.add('selected');
    walletOption.classList.remove('selected');
    bankDetails.classList.add('show');
  });

  fileBox.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) {
      receiptFile = fileInput.files[0];
      fileBox.innerHTML = `<i class="fas fa-check-circle" style="color:#2bed33;"></i> ${receiptFile.name}`;
      fileBox.classList.add('has-file');
    }
  });

  document.getElementById('methodSelect').addEventListener('change', (e) => {
    selectedMethodId = e.target.value;
  });

  document.getElementById('applyCouponBtn').addEventListener('click', applyCoupon);
  submitBtn.addEventListener('click', () => submitOrder(errorBox, submitBtn));
}

function currentPrice() {
  if (appliedCoupon) return product.price_sdg - (product.price_sdg * appliedCoupon.discount_percent / 100);
  if (welcomeDiscount) return product.price_sdg - (product.price_sdg * welcomeDiscount / 100);
  return product.price_sdg;
}
function updateSummary() { document.getElementById('summaryTotal').textContent = formatSDG(currentPrice()) + ' ج.س'; }
async function applyCoupon() {
  const code = document.getElementById('couponInput').value.trim().toUpperCase();
  const msgBox = document.getElementById('couponMessage');
  msgBox.style.color = '';
  if (!code) { msgBox.style.color = 'var(--danger)'; msgBox.textContent = 'اكتب الكود الأول'; return; }
  const { data, error } = await supabaseClient.rpc('validate_coupon', { p_code: code });
  if (error || !data || data.length === 0) { appliedCoupon = null; msgBox.style.color = 'var(--danger)'; msgBox.textContent = 'الكود غير صالح أو منتهي'; updateSummary(); return; }
  appliedCoupon = { coupon_id: data[0].coupon_id, discount_percent: data[0].discount_percent };
  msgBox.style.color = 'var(--primary)'; msgBox.textContent = `تم تطبيق خصم ${appliedCoupon.discount_percent}%`; updateSummary();
}
function collectFieldValues() {
  const inputs = document.querySelectorAll('[data-field-key]');
  const values = {};
  if (inputs.length === 0) return {};
  for (const input of inputs) {
    if (!input.value.trim()) return null;
    values[input.dataset.fieldKey] = input.value.trim();
  }
  return values;
}
async function submitOrder(errorBox, submitBtn) {
  errorBox.textContent = ''; errorBox.style.color = 'var(--danger)';
  const fieldValues = collectFieldValues();
  if (fieldValues === null) { errorBox.textContent = 'من فضلك أكمل كل البيانات المطلوبة'; return; }
  if (!selectedPayment) { errorBox.textContent = 'اختر طريقة الدفع'; return; }
  submitBtn.disabled = true; submitBtn.textContent = 'جارِ التنفيذ...';
  if (selectedPayment === 'wallet') {
    const { data, error } = await supabaseClient.rpc('create_wallet_order', { p_product_id: productId, p_field_values: fieldValues, p_coupon_code: appliedCoupon ? document.getElementById('couponInput').value.trim().toUpperCase() : null });
    if (error) { errorBox.textContent = error.message.includes('insufficient_balance') ? 'رصيدك غير كافٍ' : 'حصل خطأ، حاول تاني'; submitBtn.disabled = false; submitBtn.textContent = 'تأكيد الطلب المباشر'; return; }
    window.location.href = 'my-orders.html'; return;
  }
  if (!selectedMethodId || !receiptFile) { errorBox.textContent = !selectedMethodId ? 'اختر وسيلة التحويل' : 'ارفع صورة الإيصال'; submitBtn.disabled = false; submitBtn.textContent = 'تأكيد الطلب المباشر'; return; }
  const fileExt = receiptFile.name.split('.').pop(); const filePath = `${currentUser.id}/${Date.now()}.${fileExt}`;
  const { error: uploadError } = await supabaseClient.from('receipts').upload(filePath, receiptFile);
  if (uploadError) { errorBox.textContent = 'فشل رفع الإيصال، حاول تاني'; submitBtn.disabled = false; submitBtn.textContent = 'تأكيد الطلب المباشر'; return; }
  const { data: urlData } = supabaseClient.storage.from('receipts').getPublicUrl(filePath);
  const { error: orderError } = await supabaseClient.from('orders').insert({ user_id: currentUser.id, product_id: productId, product_name_snapshot: product.name, price_sdg_snapshot: currentPrice(), field_values: fieldValues, payment_type: 'bank', payment_method_id: selectedMethodId, receipt_url: urlData.publicUrl, status: 'pending_review' });
  if (orderError) { errorBox.textContent = 'حصل خطأ في إنشاء الطلب، حاول تاني'; submitBtn.disabled = false; submitBtn.textContent = 'تأكيد الطلب المباشر'; return; }
  if (appliedCoupon) { await supabaseClient.rpc('increment_coupon_usage', { p_coupon_id: appliedCoupon.coupon_id }); }
  else if (welcomeDiscount) { await supabaseClient.from('profiles').update({ referral_discount_used: true }).eq('id', currentUser.id); }
  window.location.href = 'my-orders.html';
}
init();
</script>
</body>
</html>
