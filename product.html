<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تفاصيل المنتج — RAIZEY STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<!-- إضافة مكتبة الأيقونات الاحترافية -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/auth.css">

<style>
  /* تفعيل لوحة الألوان الملكية المعتمدة لـ RAIZEY STORE */
  :root {
    --bg-main: #ffffff;         /* الورقي الصافي - خلفية الموقع */
    --bg-card: #f5f1ea;         /* الورقي الخافت - خلفية البطاقات */
    --accent-gold: #ff6a1a;     /* البرتقالي الحيوي - العنصر التفاعلي الأساسي */
    --border-color: #e8e1d6;    /* لون الحدود المتناسق */
    --text-light: #1a1d29;      /* الحبري الداكن - لون النصوص */
    --text-muted: #7a7468;      /* نصوص ثانوية مريحة */
    --danger: #e5484d;
  }

  body {
    background-color: var(--bg-main) !important;
    color: var(--text-light) !important;
    font-family: 'Tajawal', sans-serif;
  }

  .product-page {
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
    box-sizing: border-box;
  }

  .product-header-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding: 0 4px;
  }
  
  .back-link {
    color: var(--text-light);
    text-decoration: none;
    font-size: 14px;
    font-weight: 700;
    transition: color 0.2s;
  }
  .back-link:hover {
    color: var(--accent-gold);
  }

  .cart-badge-link {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    padding: 8px 14px;
    border-radius: 20px;
    color: var(--text-light);
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
    transition: 0.2s;
  }
  .cart-badge-link:hover {
    border-color: var(--accent-gold);
    box-shadow: 0 0 10px rgba(255, 106, 26, 0.1);
  }
  .cart-badge-link i {
    color: var(--accent-gold);
    font-size: 14px;
  }
  .cart-badge-link span {
    background: var(--accent-gold);
    color: #1a1d29;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 800;
  }

  /* هيرو المنتج الفخم */
  .product-hero {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .product-hero-thumb {
    width: 90px;
    height: 90px;
    border-radius: 12px;
    overflow: hidden;
    background: var(--bg-main);
    border: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .product-hero-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .product-hero-info h1 {
    font-size: 20px;
    font-weight: 800;
    margin: 0 0 8px 0;
    color: var(--text-light);
  }
  .product-hero-price {
    font-size: 22px;
    font-weight: 900;
    color: var(--accent-gold);
  }

  /* ستايل صندوق الشرح والتنبيهات المخصص الجديد */
  .product-instructions-box {
    background: var(--bg-card); 
    border: 1px solid var(--border-color); 
    border-right: 4px solid var(--accent-gold); /* جهة اليمين لتناسب التنسيق العربي */
    padding: 16px; 
    border-radius: 10px; 
    margin-bottom: 25px; 
    font-size: 14px; 
    line-height: 1.6; 
    color: #1a1d29; 
    white-space: pre-line;
  }
  .product-instructions-title {
    color: var(--accent-gold); 
    display: flex; 
    align-items: center; 
    gap: 8px; 
    margin-bottom: 8px; 
    font-size: 15px;
    font-weight: 700;
  }

  /* حقول إدخال البيانات المضيئة والذكية */
  .section-label {
    font-size: 14px;
    font-weight: 800;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }
  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-light);
    margin-bottom: 8px;
  }
  .field input[type="text"], .field select {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 14px;
    box-sizing: border-box;
    color: var(--text-light);
    font-size: 15px;
    font-weight: 600;
    transition: all 0.2s ease;
  }
  .field input[type="text"]:focus, .field select:focus {
    border-color: var(--accent-gold);
    box-shadow: 0 0 10px rgba(255, 106, 26, 0.1);
    outline: none;
  }

  /* زر السلة التفاعلي */
  .btn-secondary-cart {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 800;
    font-family: 'Tajawal', sans-serif;
    cursor: pointer;
    margin-top: 10px;
    margin-bottom: 25px;
    background: transparent;
    border: 1px solid var(--accent-gold);
    color: var(--accent-gold);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s ease;
    box-sizing: border-box;
  }
  .btn-secondary-cart i {
    font-size: 16px;
  }
  .btn-secondary-cart:hover {
    background: rgba(255, 106, 26, 0.04);
  }
  .btn-secondary-cart:active {
    transform: scale(0.98);
  }
  
  /* خيارات الدفع التفاعلية */
  .payment-option {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .payment-option:hover {
    border-color: rgba(255, 106, 26, 0.2);
  }
  .payment-option.selected {
    border-color: var(--accent-gold);
    background: rgba(255, 106, 26, 0.03);
    box-shadow: 0 0 12px rgba(255, 106, 26, 0.1);
  }
  .payment-option.disabled {
    pointer-events: auto !important; 
    cursor: pointer !important;
    opacity: 0.75;
  }
  .payment-option-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-light);
    margin-bottom: 4px;
  }
  .payment-option-sub {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .recharge-highlight-link {
    color: var(--accent-gold) !important;
    font-weight: 800 !important;
    text-decoration: underline !important;
    margin-right: 4px;
    display: inline-block;
  }

  /* تفاصيل الحسابات البنكية وصندوق الرفع */
  .bank-details {
    background: var(--bg-main);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
    display: none;
  }
  .copy-account-btn {
    flex-shrink: 0;
    background: var(--bg-main);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent-gold);
    cursor: pointer;
  }
  .copy-account-btn.copied { color: #16a34a; border-color: #16a34a; }
  .bank-details.show {
    display: block !important;
  }
  .file-upload {
    background: var(--bg-card);
    border: 1px dashed var(--border-color);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s ease;
    margin-top: 14px;
  }
  .file-upload:hover, .file-upload.has-file {
    border-color: var(--accent-gold);
    color: var(--text-light);
  }
  .file-upload i {
    font-size: 16px;
    margin-left: 6px;
    color: var(--accent-gold);
  }

  /* كود الخصم وصندوق الملخص السعري */
  #couponInput {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border-color);
    background: var(--bg-card);
    color: var(--text-light);
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    font-weight: 600;
    transition: border-color 0.2s;
  }
  #couponInput:focus {
    border-color: var(--accent-gold);
    outline: none;
  }
  #applyCouponBtn {
    padding: 0 20px;
    border-radius: 12px;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    color: var(--text-light);
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  #applyCouponBtn:hover {
    border-color: var(--accent-gold);
    color: var(--accent-gold);
  }

  .summary-box {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 24px 0 16px 0;
  }
  .summary-box span {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-muted);
  }
  .summary-box .total {
    font-size: 22px;
    font-weight: 900;
    color: var(--accent-gold);
  }

  /* زر التأكيد الرئيسي المضيء */
  .auth-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent-gold) !important;
    color: #1a1d29 !important;
    font-size: 16px;
    font-weight: 900;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.1s ease;
    box-sizing: border-box;
  }
  .auth-btn:active {
    transform: scale(0.98);
  }

  /* عداد الكمية */
  .qty-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg-card); border: 1px solid var(--border-color);
    border-radius: 12px; padding: 12px 16px; margin-bottom: 16px;
  }
  .qty-row .qty-label { font-size: 14px; font-weight: 800; color: var(--text-light); }
  .qty-stepper { display: inline-flex; align-items: center; gap: 14px; }
  .qty-btn {
    width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border-color);
    background: var(--bg-main); color: var(--accent-gold); font-size: 20px; font-weight: 800;
    cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1;
    transition: 0.15s ease;
  }
  .qty-btn:hover { border-color: var(--accent-gold); }
  .qty-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .qty-value { min-width: 28px; text-align: center; font-size: 18px; font-weight: 800; color: var(--text-light); font-family: 'JetBrains Mono', monospace; }

  /* شارة الثقة الاحترافية */
  .trust-strip {
    display: flex; flex-wrap: wrap; gap: 8px; margin: 4px 0 18px;
  }
  .trust-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255, 106, 26, 0.08); border: 1px solid var(--border-color);
    border-radius: 999px; padding: 7px 12px; font-size: 12px; font-weight: 700; color: var(--text-light);
  }
  .trust-chip i { color: var(--accent-gold); font-size: 12px; }
</style>
</head>
<body>

<div class="product-page" id="productPage">
  <div class="product-header-actions">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> رجوع للمتجر</a>
    <a href="cart.html" class="cart-badge-link">
      <i class="fas fa-shopping-cart"></i> السلة <span id="globalCartCount">0</span>
    </a>
  </div>

  <div id="loadingBox" style="text-align:center; padding:60px 0; color:var(--text-muted);">جارِ التحميل...</div>
  <div id="content" style="display:none;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<!-- Tesseract.js OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const productId = params.get('id');
let currentUser = null;
let product = null;
let walletBalance = 0;
let paymentMethods = [];
let selectedPayment = null;
let selectedMethodId = null;
let receiptFile = null;
let appliedCoupon = null;
let welcomeDiscount = null;
let selectedQty = 1;

function updateCartBadgeGlobal() {
  const cart = JSON.parse(localStorage.getItem('raizey_store_cart')) || [];
  document.getElementById('globalCartCount').textContent = cart.length;
}

async function init() {
  updateCartBadgeGlobal();
  if (!productId) { window.location.href = 'index.html'; return; }

  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) {
    sessionStorage.setItem('redirect_after_login', window.location.href);
    window.location.href = 'login.html';
    return;
  }
  currentUser = session.user;

  const rate = await getExchangeRate();

  const { data: p, error } = await supabaseClient
    .from('products')
    .select('*')
    .eq('id', productId)
    .single();

  if (error || !p) {
    document.getElementById('loadingBox').textContent = 'المنتج غير موجود';
    return;
  }
  product = { ...p, price_sdg: p.price_usd * rate };

  const { data: wallet } = await supabaseClient
    .from('wallets')
    .select('balance')
    .eq('user_id', currentUser.id)
    .single();
  walletBalance = wallet ? wallet.balance : 0;

  const { data: myProfile } = await supabaseClient
    .from('profiles')
    .select('referred_by, referral_discount_used')
    .eq('id', currentUser.id)
    .single();

  if (myProfile && myProfile.referred_by && !myProfile.referral_discount_used) {
    const { data: discountRow } = await supabaseClient
      .from('settings').select('value').eq('key', 'referral_signup_discount_percent').single();
    welcomeDiscount = discountRow ? parseFloat(discountRow.value) : 0;
  }

  const { data: methods } = await supabaseClient
    .from('payment_methods')
    .select('*')
    .eq('is_active', true);
  paymentMethods = methods || [];

  render();
}

function render() {
  document.getElementById('loadingBox').style.display = 'none';
  const content = document.getElementById('content');
  content.style.display = 'block';

  const fields = product.required_fields || [];
  const canUseWallet = walletBalance >= product.price_sdg;

  content.innerHTML = `
    <div class="product-hero">
      <div class="product-hero-thumb">
        ${product.image_url ? `<img src="${product.image_url}" alt="${product.name}">` : 'لا توجد صورة'}
      </div>
      <div class="product-hero-info">
        <h1>${product.name}</h1>
        <div class="product-hero-price">${formatSDG(product.price_sdg)} ج.س</div>
      </div>
    </div>

    <div class="trust-strip">
      <span class="trust-chip"><i class="fas fa-bolt"></i> تسليم فوري ومضمون 100%</span>
      <span class="trust-chip"><i class="fas fa-shield-halved"></i> خدمة معتمدة وآمنة</span>
    </div>

    ${product.instructions ? `
      <div class="product-instructions-box">
        <div class="product-instructions-title">
          <i class="fas fa-circle-info"></i> تفاصيل وطريقة استلام المنتج:
        </div>
        ${product.instructions}
      </div>
    ` : ''}

    ${fields.length > 0 ? `
      <div class="section-label">بيانات الطلب</div>
      ${fields.map(f => {
        const placeholderText = f.placeholder ? f.placeholder : `اكتب ${f.label} هنا...`;
        return `
          <div class="field">
            <label>${f.label}</label>
            <input type="text" data-field-key="${f.key}" required placeholder="${placeholderText}">
          </div>
        `;
      }).join('')}
    ` : ''}

    <div class="section-label">الكمية</div>
    <div class="qty-row">
      <span class="qty-label">عدد الوحدات</span>
      <div class="qty-stepper">
        <button type="button" class="qty-btn" id="qtyMinus" disabled>−</button>
        <span class="qty-value" id="qtyValue">1</span>
        <button type="button" class="qty-btn" id="qtyPlus">+</button>
      </div>
    </div>

    ${welcomeDiscount ? `
      <div style="background:rgba(255, 106, 26,0.06); border:1px solid var(--accent-gold); border-radius:12px; padding:12px 14px; margin-bottom:16px; font-size:13px; color:var(--accent-gold); font-weight:700;">
        خصم ترحيبي ${welcomeDiscount}% مطبق تلقائياً على أول طلب ليك
      </div>
    ` : ''}

    <div class="summary-box">
      <span>الإجمالي</span>
      <span class="total" id="summaryTotal">${formatSDG(currentPrice())} ج.س</span>
    </div>

    <div class="form-error" id="formError" style="margin-bottom:12px; font-weight:700; color:var(--danger);"></div>

    <button class="btn-secondary-cart" id="addToCartBtn">
      <i class="fas fa-cart-plus"></i> إضافة إلى سلة المشتريات
    </button>

    <button class="auth-btn" id="buyNowBtn" style="margin-top:12px;">
      <i class="fas fa-bolt"></i> الشراء الآن
    </button>
  `;

  attachEvents(canUseWallet);
}

function attachEvents() {
  const errorBox = document.getElementById('formError');
  const addToCartBtn = document.getElementById('addToCartBtn');
  const buyNowBtn = document.getElementById('buyNowBtn');
  const qtyMinus = document.getElementById('qtyMinus');
  const qtyPlus = document.getElementById('qtyPlus');

  // ── عداد الكمية ──
  function renderQty() {
    document.getElementById('qtyValue').textContent = selectedQty;
    qtyMinus.disabled = selectedQty <= 1;
    updateSummary();
  }
  qtyMinus.addEventListener('click', () => { if (selectedQty > 1) { selectedQty--; renderQty(); } });
  qtyPlus.addEventListener('click', () => { selectedQty++; renderQty(); });
  renderQty();

  // ── الإضافة إلى السلة ──
  addToCartBtn.addEventListener('click', () => {
    errorBox.textContent = '';
    const fieldValues = collectFieldValues();
    if (fieldValues === null) {
      errorBox.style.color = 'var(--danger)';
      errorBox.textContent = 'من فضلك املأ الحقول المطلوبة أولاً!';
      return;
    }

    let cart = JSON.parse(localStorage.getItem('raizey_store_cart')) || [];
    cart.push(buildLineItem(fieldValues, product.price_sdg));
    localStorage.setItem('raizey_store_cart', JSON.stringify(cart));
    updateCartBadgeGlobal();

    errorBox.style.color = 'var(--accent-gold)';
    errorBox.textContent = 'تم إضافة المنتج بنجاح إلى السلة!';
    addToCartBtn.innerHTML = '<i class="fas fa-check-circle"></i> تم الإضافة بنجاح!';
    setTimeout(() => {
      addToCartBtn.innerHTML = '<i class="fas fa-cart-plus"></i> إضافة إلى سلة المشتريات';
      errorBox.textContent = '';
    }, 2500);
  });

  // ── الشراء الآن → صفحة إتمام الطلب ──
  buyNowBtn.addEventListener('click', () => {
    errorBox.textContent = '';
    const fieldValues = collectFieldValues();
    if (fieldValues === null) {
      errorBox.style.color = 'var(--danger)';
      errorBox.textContent = 'من فضلك املأ الحقول المطلوبة أولاً!';
      return;
    }
    // السعر بعد الخصم الترحيبي (إن وُجد) — الدفع من المحفظة يُعاد حسابه على الخادم
    const buyItem = buildLineItem(fieldValues, unitPrice());
    localStorage.setItem('raizey_buy_now', JSON.stringify([buyItem]));
    window.location.href = 'checkout.html';
  });
}

// بناء عنصر طلب موحّد للسلة أو الشراء المباشر
function buildLineItem(fieldValues, priceSdg) {
  return {
    cart_item_id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
    product_id: product.id,
    name: product.name,
    price_sdg: priceSdg,
    image_url: product.image_url,
    field_values: fieldValues,
    quantity: selectedQty
  };
}

function unitPrice() {
  if (welcomeDiscount) return product.price_sdg - (product.price_sdg * welcomeDiscount / 100);
  return product.price_sdg;
}
function updateSummary() {
  document.getElementById('summaryTotal').textContent = formatSDG(unitPrice() * selectedQty) + ' ج.س';
}

function collectFieldValues() {
  const inputs = document.querySelectorAll('[data-field-key]');
  const values = {};
  if (inputs.length === 0) return {};
  for (const input of inputs) {
    if (!input.value.trim()) return null;
    values[input.dataset.fieldKey] = input.value.trim();
  }
  return values;
}

init();
</script>
</body>
</html>
