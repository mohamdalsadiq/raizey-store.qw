<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>طلباتي — RAIZEY STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="assets/css/auth.css">

<style>
  .orders-page {
    max-width: 600px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }
  .order-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
    transition: 0.2s ease;
  }
  .order-card:hover {
    border-color: rgba(255, 106, 26, 0.3);
  }
  .order-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px dashed var(--border);
  }
  .order-product {
    font-size: 16px;
    font-weight: 800;
    color: var(--ink);
  }
  .order-date {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .status-badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
  }
  .status-pending_review { background: rgba(255,106,26,0.12); color: #ff6a1a; }
  .status-in_progress    { background: rgba(59,130,246,0.12);  color: #3b82f6; }
  .status-completed      { background: rgba(34,197,94,0.12);   color: #22c55e; }
  .status-rejected       { background: rgba(229,72,77,0.12);   color: #e5484d; }
  .status-cancelled      { background: rgba(120,120,120,0.12); color: #888;    }

  .order-details {
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .order-details strong {
    color: var(--ink);
  }
  .order-fields-list {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    margin-top: 4px;
  }
  .order-fields-list div {
    font-size: 12px;
    color: var(--ink);
    padding: 2px 0;
  }
  .order-rejection {
    background: rgba(229,72,77,0.08);
    border: 1px solid rgba(229,72,77,0.2);
    border-radius: 8px;
    padding: 10px;
    margin-top: 10px;
    font-size: 12px;
    color: #e5484d;
  }
  .cancel-order-btn {
    background: transparent;
    border: 1px solid var(--danger, #e5484d);
    color: var(--danger, #e5484d);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 12px;
    transition: 0.2s;
  }
  .cancel-order-btn:hover {
    background: rgba(229,72,77,0.1);
  }
</style>
</head>
<body>

<div class="orders-page">
  <div class="page-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <div style="display:flex; align-items:center; gap:8px;">
      <i class="fas fa-box-open" style="color:var(--primary); font-size:20px;"></i>
      <h1 style="font-size:20px; margin:0;">طلباتي</h1>
    </div>
    <a href="index.html" class="back-link" style="margin-bottom:0;"><i class="fas fa-store"></i> المتجر</a>
  </div>

  <div id="ordersList">
    <div style="text-align:center; padding:60px 0; color:var(--text-muted);">
      <i class="fas fa-circle-notch fa-spin" style="font-size:26px; margin-bottom:10px; color:var(--primary);"></i>
      <div>جارِ تحميل الطلبات...</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
const statusLabels = {
  pending_review: 'قيد المراجعة',
  in_progress: 'قيد التنفيذ',
  completed: 'مكتمل',
  cancelled: 'ملغي',
  rejected: 'مرفوض'
};

const paymentLabels = {
  wallet: 'من المحفظة',
  bank: 'تحويل بنكك'
};

let currentUser = null;

async function init() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) {
    sessionStorage.setItem('redirect_after_login', window.location.href);
    window.location.href = 'login.html';
    return;
  }
  currentUser = session.user;
  await loadOrders();
}

async function loadOrders() {
  const { data: orders, error } = await supabaseClient
    .from('orders')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false });

  const container = document.getElementById('ordersList');

  if (error || !orders || orders.length === 0) {
    container.innerHTML = `
      <div style="text-align:center; padding:60px 20px; color:var(--text-muted);">
        <i class="fas fa-box-open" style="font-size:42px; color:var(--border); margin-bottom:12px; display:block;"></i>
        <h3 style="color:var(--ink); margin-bottom:8px; font-size:16px;">لا توجد طلبات بعد</h3>
        <p style="font-size:13px;">ابدأ التسوق من الصفحة الرئيسية وستظهر طلباتك هنا</p>
        <a href="index.html" class="auth-btn" style="display:inline-block; text-decoration:none; margin-top:14px; width:auto; padding:10px 20px;">تصفح المتجر</a>
      </div>`;
    return;
  }

  container.innerHTML = orders.map(o => renderOrderCard(o)).join('');

  document.querySelectorAll('.cancel-order-btn').forEach(btn => {
    btn.addEventListener('click', () => cancelOrder(btn.dataset.orderId));
  });
}

function renderOrderCard(o) {
  const date = new Date(o.created_at).toLocaleDateString('ar-EG', {
    year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
  });

  let fieldsHtml = '';
  if (o.field_values && Object.keys(o.field_values).length > 0) {
    fieldsHtml = `
      <div class="order-fields-list">
        ${Object.entries(o.field_values).map(([k, v]) =>
          `<div><strong style="color:var(--text-muted);">${escapeHtml(k)}:</strong> ${escapeHtml(v)}</div>`
        ).join('')}
      </div>
    `;
  }

  return `
    <div class="order-card">
      <div class="order-top">
        <div>
          <div class="order-product">${escapeHtml(o.product_name_snapshot)}</div>
          <div class="order-date"><i class="far fa-clock" style="margin-left:4px;"></i>${date}</div>
        </div>
        <span class="status-badge status-${escapeHtml(o.status)}">${statusLabels[o.status] || escapeHtml(o.status)}</span>
      </div>

      <div class="order-details">
        <div><strong>السعر:</strong> <span style="color:var(--primary); font-family:'JetBrains Mono', monospace; font-weight:700;">${formatSDG(o.price_sdg_snapshot)} ج.س</span></div>
        <div><strong>طريقة الدفع:</strong> ${paymentLabels[o.payment_type] || escapeHtml(o.payment_type)}</div>
        ${fieldsHtml}
        ${o.receipt_url ? `<div><a href="${escapeHtml(o.receipt_url)}" target="_blank" rel="noopener" style="color:var(--primary); font-weight:700; text-decoration:none;"><i class="fas fa-image"></i> عرض صورة الإيصال</a></div>` : ''}
      </div>

      <div style="margin-top:12px; display:flex; justify-content:space-between; align-items:center;">
        <a href="receipt.html?order_id=${escapeHtml(o.id)}" style="color:var(--primary); font-size:13px; font-weight:700; text-decoration:none;">
          <i class="fas fa-receipt"></i> عرض الإيصال والتفاصيل
        </a>
      </div>

      ${o.status === 'rejected' && o.rejection_reason ? `
        <div class="order-rejection"><strong>سبب الرفض:</strong> ${escapeHtml(o.rejection_reason)}</div>
      ` : ''}

      ${o.status === 'pending_review' ? `
        <button class="cancel-order-btn" data-order-id="${escapeHtml(o.id)}"><i class="fas fa-times-circle"></i> إلغاء الطلب</button>
      ` : ''}
    </div>
  `;
}

async function cancelOrder(orderId) {
  if (!confirm('هل أنت تأكد من رغبتك في إلغاء هذا الطلب؟')) return;

  const { error } = await supabaseClient
    .from('orders')
    .update({ status: 'cancelled' })
    .eq('id', orderId)
    .eq('user_id', currentUser.id)
    .eq('status', 'pending_review');

  if (!error) {
    await loadOrders();
  } else {
    alert('حدث خطأ أثناء إلغاء الطلب، يرجى المحاولة لاحقاً.');
  }
}

init();
</script>
</body>
</html>
