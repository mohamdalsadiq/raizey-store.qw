<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تأكيد الحساب — RAIZEY STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">RAIZEY <span>STORE</span></div>
    <h1 class="auth-title">تأكيد الحساب</h1>
    <p class="auth-sub" id="subText">أدخل الكود اللي وصلك على إيميلك</p>

    <form id="verifyForm">
      <div class="otp-inputs">
        <input type="text" maxlength="1" inputmode="numeric" class="otp-digit">
        <input type="text" maxlength="1" inputmode="numeric" class="otp-digit">
        <input type="text" maxlength="1" inputmode="numeric" class="otp-digit">
        <input type="text" maxlength="1" inputmode="numeric" class="otp-digit">
        <input type="text" maxlength="1" inputmode="numeric" class="otp-digit">
        <input type="text" maxlength="1" inputmode="numeric" class="otp-digit">
      </div>

      <div class="form-error" id="formError"></div>
      <div class="form-success" id="formSuccess"></div>

      <button type="submit" class="auth-btn" id="submitBtn">تأكيد</button>
    </form>

    <p class="resend-link">
      ما وصلك الكود؟
      <button id="resendBtn" type="button">أعد الإرسال</button>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
const email = sessionStorage.getItem('pending_email');
if (!email) {
  window.location.href = 'register.html';
}
document.getElementById('subText').textContent = `أدخل الكود اللي وصلك على ${email}`;

const digits = document.querySelectorAll('.otp-digit');
digits.forEach((input, idx) => {
  input.addEventListener('input', () => {
    if (input.value && idx < digits.length - 1) digits[idx + 1].focus();
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && !input.value && idx > 0) digits[idx - 1].focus();
  });
});

const form = document.getElementById('verifyForm');
const errorBox = document.getElementById('formError');
const successBox = document.getElementById('formSuccess');
const submitBtn = document.getElementById('submitBtn');
const resendBtn = document.getElementById('resendBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorBox.textContent = '';
  const code = [...digits].map(d => d.value).join('');

  if (code.length !== 6) {
    errorBox.textContent = 'أدخل الكود كاملاً (6 أرقام)';
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'جارِ التحقق...';

  const { data, error } = await supabaseClient.auth.verifyOtp({
    email,
    token: code,
    type: 'signup'
  });

  if (error) {
    errorBox.textContent = 'الكود غير صحيح أو منتهي الصلاحية';
    submitBtn.disabled = false;
    submitBtn.textContent = 'تأكيد';
    return;
  }

  sessionStorage.removeItem('pending_email');
  window.location.href = 'index.html';
});

resendBtn.addEventListener('click', async () => {
  resendBtn.disabled = true;
  successBox.textContent = '';
  errorBox.textContent = '';

  const { error } = await supabaseClient.auth.resend({
    type: 'signup',
    email
  });

  if (error) {
    errorBox.textContent = 'حصل خطأ في إعادة الإرسال، حاول بعد شوية';
  } else {
    successBox.textContent = 'تم إرسال كود جديد';
  }

  setTimeout(() => { resendBtn.disabled = false; }, 30000);
});
</script>
</body>
</html>
