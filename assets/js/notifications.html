<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الإشعارات — RAIZEY STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>

<div class="orders-page">
  <div class="page-header">
    <h1>الإشعارات</h1>
    <a href="index.html" class="back-link">→ المتجر</a>
  </div>
  <div id="notifList"><div style="text-align:center; padding:40px 0; color:var(--text-muted);">جارِ التحميل...</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
async function init() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  const { data: notifications } = await supabaseClient
    .from('notifications')
    .select('*')
    .eq('user_id', session.user.id)
    .order('created_at', { ascending: false });

  render(notifications || []);

  const unreadIds = (notifications || []).filter(n => !n.is_read).map(n => n.id);
  if (unreadIds.length > 0) {
    await supabaseClient.from('notifications').update({ is_read: true }).in('id', unreadIds);
  }
}

function render(notifications) {
  const container = document.getElementById('notifList');
  if (notifications.length === 0) {
    container.innerHTML = `<div style="text-align:center; padding:40px 20px; color:var(--text-muted);"><h3 style="color:var(--ink); margin-bottom:8px;">لا توجد إشعارات بعد</h3></div>`;
    return;
  }

  container.innerHTML = notifications.map(n => {
    const date = new Date(n.created_at).toLocaleDateString('ar-EG', {
      year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
    });
    return `
      <div class="order-card" style="${!n.is_read ? 'border-color:var(--primary);' : ''}">
        <div class="order-product">${n.title}</div>
        <div class="order-details" style="border-top:none; padding-top:6px; margin-top:6px;">
          <div>${n.message}</div>
        </div>
        <div class="order-date">${date}</div>
      </div>
    `;
  }).join('');
}

init();
</script>
</body>
</html>
