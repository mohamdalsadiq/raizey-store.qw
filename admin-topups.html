<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شحن المحافظ — RAIZEY STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/auth.css">
<link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

<div class="admin-page" id="adminPage" style="display:none;">
  <div class="page-header">
    <h1>شحن المحافظ</h1>
    <a href="index.html" class="back-link">→ المتجر</a>
  </div>

  <div class="admin-nav">
    <a href="admin.html">الرئيسية</a>
    <a href="admin-orders.html">الطلبات</a>
    <a href="admin-topups.html" class="active">شحن المحافظ</a>
    <a href="admin-products.html">المنتجات</a>
    <a href="admin-categories.html">التصنيفات</a>
    <a href="admin-customers.html">العملاء</a>
    <a href="admin-payment-methods.html">وسائل الدفع</a>
    <a href="admin-settings.html">الإعدادات</a>
    <a href="admin-audit-log.html">سجل النشاطات</a>
    <a href="admin-coupons.html">الكوبونات</a>
<a href="admin-giftcards.html">كروت الهدايا</a>
  </div>

  <div class="categories" style="padding:0 0 16px;" id="filterRow">
    <button class="chip active" data-filter="all">الكل</button>
    <button class="chip" data-filter="pending">قيد المراجعة</button>
    <button class="chip" data-filter="confirmed">مؤكد</button>
    <button class="chip" data-filter="rejected">مرفوض</button>
  </div>

  <div id="topupsList"><div style="color:var(--text-muted); font-size:13px;">جارِ التحميل...</div></div>
</div>

<div class="modal-overlay" id="rejectModal">
  <div class="modal-box">
    <div class="modal-title">سبب رفض طلب الشحن</div>
    <button class="reason-option" data-reason="الإيصال غير واضح">الإيصال غير واضح</button>
    <button class="reason-option" data-reason="المبلغ المحول غير مطابق">المبلغ المحول غير مطابق</button>
    <button class="reason-option" data-reason="لم يصل التحويل بعد">لم يصل التحويل بعد</button>
    <button class="reason-option" data-reason="الإيصال مكرر أو مستخدم من قبل">الإيصال مكرر أو مستخدم من قبل</button>
    <button class="reason-option" data-reason="custom">سبب آخر...</button>
    <textarea class="reason-custom" id="customReasonInput" rows="3" placeholder="اكتب السبب هنا"></textarea>
    <div class="modal-actions">
      <button class="modal-cancel-btn" id="modalCancelBtn">إلغاء</button>
      <button class="modal-confirm-btn" id="modalConfirmBtn" disabled>تأكيد الرفض</button>
    </div>
  </div>
</div>

<div id="accessDenied" style="display:none; text-align:center; padding:80px 20px; color:var(--text-muted);">
  <h3 style="color:var(--white); margin-bottom:8px;">غير مصرح لك بالدخول</h3>
  <a href="index.html" style="color:var(--primary); font-weight:700;">← رجوع للمتجر</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
let allTopups = [];
let currentFilter = 'all';
let rejectingTopupId = null;
let selectedReason = null;
let currentAdminId = null;

const statusLabels = { pending: 'قيد المراجعة', confirmed: 'مؤكد', rejected: 'مرفوض' };

const rejectModal = document.getElementById('rejectModal');
const customReasonInput = document.getElementById('customReasonInput');
const modalConfirmBtn = document.getElementById('modalConfirmBtn');

document.querySelectorAll('.reason-option').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.reason-option').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    if (btn.dataset.reason === 'custom') {
      customReasonInput.classList.add('show');
      selectedReason = customReasonInput.value.trim() || null;
    } else {
      customReasonInput.classList.remove('show');
      selectedReason = btn.dataset.reason;
    }
    modalConfirmBtn.disabled = !selectedReason;
  });
});

customReasonInput.addEventListener('input', () => {
  selectedReason = customReasonInput.value.trim() || null;
  modalConfirmBtn.disabled = !selectedReason;
});

document.getElementById('modalCancelBtn').addEventListener('click', closeRejectModal);

modalConfirmBtn.addEventListener('click', async () => {
  if (!selectedReason || !rejectingTopupId) return;
  const topup = allTopups.find(t => t.id === rejectingTopupId);
  await supabaseClient.from('wallet_topups')
    .update({ status: 'rejected', rejection_reason: selectedReason, reviewed_at: new Date().toISOString() })
    .eq('id', rejectingTopupId);
  if (topup) {
    await notifyCustomer(topup.user_id, 'تم رفض طلب الشحن', `طلب شحن ${formatSDG(topup.amount)} ج.س رُفض. السبب: ${selectedReason}`);
    await logAudit('رفض شحن محفظة', { topup_id: rejectingTopupId, amount: topup.amount, reason: selectedReason });
  }
  closeRejectModal();
  await loadTopups();
});

function openRejectModal(topupId) {
  rejectingTopupId = topupId;
  selectedReason = null;
  customReasonInput.value = '';
  customReasonInput.classList.remove('show');
  document.querySelectorAll('.reason-option').forEach(b => b.classList.remove('selected'));
  modalConfirmBtn.disabled = true;
  rejectModal.classList.add('show');
}

function closeRejectModal() {
  rejectModal.classList.remove('show');
  rejectingTopupId = null;
}

async function init() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  const { data: profile } = await supabaseClient
    .from('profiles').select('role').eq('id', session.user.id).single();

  if (!profile || profile.role !== 'admin') {
    document.getElementById('accessDenied').style.display = 'block';
    return;
  }

  currentAdminId = session.user.id;

  document.getElementById('adminPage').style.display = 'block';

  document.querySelectorAll('#filterRow .chip').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#filterRow .chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  await loadTopups();
}

async function loadTopups() {
  const { data } = await supabaseClient
    .from('wallet_topups')
    .select('*, profiles(full_name, whatsapp_number)')
    .order('created_at', { ascending: false });

  allTopups = data || [];
  render();
}

function render() {
  const container = document.getElementById('topupsList');
  const filtered = currentFilter === 'all'
    ? allTopups
    : allTopups.filter(t => t.status === currentFilter);

  if (filtered.length === 0) {
    container.innerHTML = `<div style="color:var(--text-muted); font-size:13px; text-align:center; padding:30px 0;">لا توجد طلبات في هذا التصنيف</div>`;
    return;
  }

  container.innerHTML = filtered.map(t => renderTopupCard(t)).join('');

  container.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => handleAction(btn.dataset.action, btn.dataset.topupId));
  });
}

function renderTopupCard(t) {
  const date = new Date(t.created_at).toLocaleDateString('ar-EG', {
    year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
  });

  const customerName = t.profiles?.full_name || 'بدون اسم';
  const customerWhatsapp = t.profiles?.whatsapp_number || '—';

  const actions = t.status === 'pending' ? `
    <div class="admin-order-actions">
      <button class="admin-btn btn-confirm" data-action="confirm" data-topup-id="${t.id}">تأكيد</button>
      <button class="admin-btn btn-reject" data-action="reject" data-topup-id="${t.id}">رفض</button>
    </div>` : '';

  return `
    <div class="order-card">
      <div class="order-top">
        <div>
          <div class="order-product">${formatSDG(t.amount)} ج.س</div>
          <div class="order-date">${date}</div>
        </div>
        <span class="status-badge status-${t.status}">${statusLabels[t.status] || t.status}</span>
      </div>
      <div class="customer-info">👤 ${customerName} — 📱 ${customerWhatsapp}</div>
      <div class="order-details">
        ${t.receipt_url ? `<div><a href="${t.receipt_url}" target="_blank" style="color:var(--primary);">عرض الإيصال</a></div>` : ''}
      </div>
      ${t.status === 'rejected' && t.rejection_reason ? `<div class="order-rejection">سبب الرفض: ${t.rejection_reason}</div>` : ''}
      ${actions}
    </div>
  `;
}

async function handleAction(action, topupId) {
  if (action === 'confirm') {
    const topup = allTopups.find(t => t.id === topupId);
    if (!topup) return;

    const { data: wallet } = await supabaseClient
      .from('wallets').select('balance').eq('user_id', topup.user_id).single();

    const newBalance = (wallet ? Number(wallet.balance) : 0) + Number(topup.amount);

    await supabaseClient.from('wallets')
      .update({ balance: newBalance, updated_at: new Date().toISOString() })
      .eq('user_id', topup.user_id);

    await supabaseClient.from('wallet_topups')
      .update({ status: 'confirmed', reviewed_at: new Date().toISOString() })
      .eq('id', topupId);

    await notifyCustomer(topup.user_id, 'تم شحن محفظتك', `تم إضافة ${formatSDG(topup.amount)} ج.س لرصيدك.`);
    await logAudit('تأكيد شحن محفظة', { topup_id: topupId, amount: topup.amount, user_id: topup.user_id });

    await loadTopups();
  } else if (action === 'reject') {
    openRejectModal(topupId);
  }
}

async function notifyCustomer(userId, title, message) {
  await supabaseClient.from('notifications').insert({ user_id: userId, title, message, type: 'wallet' });
}

async function logAudit(action, details) {
  await supabaseClient.from('audit_logs').insert({ admin_id: currentAdminId, action, details });
}

init();
</script>
</body>
</html>
