<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجل النشاطات — RAIZEY STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/auth.css">
<link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

<div class="admin-page" id="adminPage" style="display:none;">
  <div class="page-header">
    <h1>سجل النشاطات</h1>
    <a href="admin.html" class="back-link">→ لوحة التحكم</a>
  </div>

  <div id="logsList"><div style="color:var(--text-muted); font-size:13px;">جارِ التحميل...</div></div>
</div>

<div id="accessDenied" style="display:none; text-align:center; padding:80px 20px; color:var(--text-muted);">
  <h3 style="color:var(--white); margin-bottom:8px;">غير مصرح لك بالدخول</h3>
  <a href="index.html" style="color:var(--primary); font-weight:700;">← رجوع للمتجر</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
async function init() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  const { data: profile } = await supabaseClient
    .from('profiles').select('role').eq('id', session.user.id).single();

  if (!profile || profile.role !== 'admin') {
    document.getElementById('accessDenied').style.display = 'block';
    return;
  }

  document.getElementById('adminPage').style.display = 'block';
  await loadLogs();
}

async function loadLogs() {
  const { data: logs } = await supabaseClient
    .from('audit_logs')
    .select('*, profiles(full_name)')
    .order('created_at', { ascending: false })
    .limit(100);

  const container = document.getElementById('logsList');
  if (!logs || logs.length === 0) {
    container.innerHTML = `<div style="color:var(--text-muted); font-size:13px; text-align:center; padding:30px 0;">لا توجد نشاطات مسجلة بعد</div>`;
    return;
  }

  container.innerHTML = logs.map(l => {
    const date = new Date(l.created_at).toLocaleDateString('ar-EG', {
      year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
    });
    const adminName = l.profiles?.full_name || 'أدمن';
    const detailsText = l.details ? Object.entries(l.details).map(([k, v]) => `${k}: ${v}`).join(' — ') : '';

    return `
      <div class="mini-list-item" style="flex-direction:column; align-items:stretch;">
        <div style="display:flex; justify-content:space-between;">
          <div class="name">${l.action}</div>
          <div class="sub">${date}</div>
        </div>
        <div class="sub" style="margin-top:4px;">بواسطة: ${adminName}</div>
        ${detailsText ? `<div class="sub" style="margin-top:2px;">${detailsText}</div>` : ''}
      </div>
    `;
  }).join('');
}

init();
</script>
</body>
</html>
