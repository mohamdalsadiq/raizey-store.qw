<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مستويات الإحالة — RAIZEY STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/auth.css">
<link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

<div class="admin-page" id="adminPage" style="display:none;">
  <div class="page-header">
    <h1>مستويات مكافآت الإحالة</h1>
    <a href="admin.html" class="back-link">→ لوحة التحكم</a>
  </div>

  <p style="font-size:12px; color:var(--text-muted); margin-bottom:16px;">
    أضف أي عدد من المستويات (مثلاً 30 إحالة، 50 إحالة، 100 إحالة...) وحدد قيمة المكافأة لكل مستوى.
  </p>

  <button class="add-new-btn" id="addNewBtn">+ إضافة مستوى جديد</button>

  <div id="milestonesList"><div style="color:var(--text-muted); font-size:13px;">جارِ التحميل...</div></div>
</div>

<div class="modal-overlay" id="formModal">
  <div class="modal-box">
    <div class="modal-title" id="formModalTitle">مستوى جديد</div>

    <div class="field">
      <label>عدد الإحالات المطلوب</label>
      <input type="number" id="thresholdInput" placeholder="مثلاً: 30">
    </div>

    <div class="field">
      <label>قيمة المكافأة (ج.س)</label>
      <input type="number" id="bonusInput" placeholder="مثلاً: 6000">
    </div>

    <div class="field">
      <label>اسم المستوى (اختياري)</label>
      <input type="text" id="labelInput" placeholder="مثلاً: المستوى الثالث">
    </div>

    <div class="field">
      <label>الحالة</label>
      <select id="activeInput">
        <option value="true">فعّال</option>
        <option value="false">معطّل</option>
      </select>
    </div>

    <div class="form-error" id="formError"></div>

    <div class="modal-actions">
      <button class="modal-cancel-btn" id="formCancelBtn">إلغاء</button>
      <button class="modal-confirm-btn" id="formSaveBtn" style="background:var(--primary); color:#0a1a0a;">حفظ</button>
    </div>
  </div>
</div>

<div id="accessDenied" style="display:none; text-align:center; padding:80px 20px; color:var(--text-muted);">
  <h3 style="color:var(--white); margin-bottom:8px;">غير مصرح لك بالدخول</h3>
  <a href="index.html" style="color:var(--primary); font-weight:700;">← رجوع للمتجر</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
let milestones = [];
let editingId = null;

const formModal = document.getElementById('formModal');
const thresholdInput = document.getElementById('thresholdInput');
const bonusInput = document.getElementById('bonusInput');
const labelInput = document.getElementById('labelInput');
const activeInput = document.getElementById('activeInput');
const formError = document.getElementById('formError');

async function init() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  const { data: profile } = await supabaseClient
    .from('profiles').select('role').eq('id', session.user.id).single();

  if (!profile || profile.role !== 'admin') {
    document.getElementById('accessDenied').style.display = 'block';
    return;
  }

  document.getElementById('adminPage').style.display = 'block';
  document.getElementById('addNewBtn').addEventListener('click', () => openForm(null));
  document.getElementById('formCancelBtn').addEventListener('click', closeForm);
  document.getElementById('formSaveBtn').addEventListener('click', saveMilestone);

  await loadMilestones();
}

async function loadMilestones() {
  const { data } = await supabaseClient.from('referral_milestones').select('*').order('threshold');
  milestones = data || [];
  render();
}

function render() {
  const container = document.getElementById('milestonesList');
  if (milestones.length === 0) {
    container.innerHTML = `<div style="color:var(--text-muted); font-size:13px; text-align:center; padding:30px 0;">لا توجد مستويات بعد</div>`;
    return;
  }

  container.innerHTML = milestones.map(m => `
    <div class="manage-item">
      <div class="manage-item-info">
        <div class="manage-item-name">
          ${m.label || 'مستوى'} — ${m.threshold} إحالة
          ${!m.is_active ? '<span class="inactive-badge">معطّل</span>' : ''}
        </div>
        <div class="manage-item-sub">مكافأة: ${formatSDG(m.bonus)} ج.س</div>
      </div>
      <div class="manage-item-actions">
        <button class="icon-action-btn" data-action="edit" data-id="${m.id}">✏️</button>
        <button class="icon-action-btn" data-action="delete" data-id="${m.id}">🗑️</button>
      </div>
    </div>
  `).join('');

  container.querySelectorAll('[data-action="edit"]').forEach(btn => {
    btn.addEventListener('click', () => openForm(btn.dataset.id));
  });
  container.querySelectorAll('[data-action="delete"]').forEach(btn => {
    btn.addEventListener('click', () => deleteMilestone(btn.dataset.id));
  });
}

function openForm(id) {
  editingId = id;
  formError.textContent = '';

  if (id) {
    const m = milestones.find(x => x.id === id);
    document.getElementById('formModalTitle').textContent = 'تعديل المستوى';
    thresholdInput.value = m.threshold;
    bonusInput.value = m.bonus;
    labelInput.value = m.label || '';
    activeInput.value = String(m.is_active);
  } else {
    document.getElementById('formModalTitle').textContent = 'مستوى جديد';
    thresholdInput.value = '';
    bonusInput.value = '';
    labelInput.value = '';
    activeInput.value = 'true';
  }

  formModal.classList.add('show');
}

function closeForm() {
  formModal.classList.remove('show');
  editingId = null;
}

async function saveMilestone() {
  const threshold = parseInt(thresholdInput.value);
  const bonus = parseFloat(bonusInput.value);

  if (!threshold || threshold <= 0) { formError.textContent = 'أدخل عدد إحالات صحيح'; return; }
  if (!bonus || bonus <= 0) { formError.textContent = 'أدخل قيمة مكافأة صحيحة'; return; }

  const payload = {
    threshold,
    bonus,
    label: labelInput.value.trim() || null,
    is_active: activeInput.value === 'true'
  };

  const { error } = editingId
    ? await supabaseClient.from('referral_milestones').update(payload).eq('id', editingId)
    : await supabaseClient.from('referral_milestones').insert(payload);

  if (error) {
    formError.textContent = 'حصل خطأ، حاول تاني';
    return;
  }

  closeForm();
  await loadMilestones();
}

async function deleteMilestone(id) {
  if (!confirm('متأكد عايز تحذف المستوى ده؟')) return;
  await supabaseClient.from('referral_milestones').delete().eq('id', id);
  await loadMilestones();
}

init();
</script>
</body>
</html>
