<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — RAIZEY STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/auth.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">RAIZEY <span>STORE</span></div>
    <h1 class="auth-title">تسجيل الدخول</h1>
    <p class="auth-sub">أهلاً بيك تاني في RAIZEY STORE</p>

    <form id="loginForm">
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input type="email" id="email" required placeholder="example@email.com">
      </div>

      <div class="field">
        <label>كلمة السر</label>
        <input type="password" id="password" required placeholder="كلمة السر">
      </div>

      <div class="form-error" id="formError"></div>

      <button type="submit" class="auth-btn" id="submitBtn">دخول</button>
    </form>

    <p class="auth-switch" style="margin-top:12px;">
      <a href="javascript:void(0)" id="forgotLink">نسيت كلمة السر؟</a>
    </p>

    <div id="forgotBox" style="display:none; margin-top:14px;">
      <div class="field">
        <label>أدخل إيميلك لإرسال رابط إعادة التعيين</label>
        <input type="email" id="forgotEmail" placeholder="example@email.com">
      </div>
      <div class="form-error" id="forgotError"></div>
      <div class="form-success" id="forgotSuccess"></div>
      <button class="auth-btn" id="forgotBtn" style="background:var(--bg-card); color:var(--ink); border:1px solid var(--border);">إرسال رابط إعادة التعيين</button>
    </div>

    <p class="auth-switch">ما عندك حساب؟ <a href="register.html">أنشئ حساب جديد</a></p>

    <div class="auth-divider">أو</div>
    <div class="social-login-row">
      <button type="button" class="social-btn fb-btn" onclick="showSocialSoon()"><i class="fab fa-facebook-f"></i> فيسبوك</button>
      <button type="button" class="social-btn google-btn" onclick="showSocialSoon()"><i class="fab fa-google"></i> جوجل</button>
    </div>
    <p class="form-error" id="socialSoonMsg" style="text-align:center; margin-top:10px;"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
const form = document.getElementById('loginForm');
const errorBox = document.getElementById('formError');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorBox.textContent = '';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  submitBtn.disabled = true;
  submitBtn.textContent = 'جارِ الدخول...';

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

  if (error) {
    if (error.message.includes('Email not confirmed')) {
      sessionStorage.setItem('pending_email', email);
      window.location.href = 'verify.html';
      return;
    }
    errorBox.textContent = 'الإيميل أو كلمة السر غير صحيحة';
    submitBtn.disabled = false;
    submitBtn.textContent = 'دخول';
    return;
  }

  window.location.href = 'index.html';
});

document.getElementById('forgotLink').addEventListener('click', () => {
  document.getElementById('forgotBox').style.display =
    document.getElementById('forgotBox').style.display === 'none' ? 'block' : 'none';
});

document.getElementById('forgotBtn').addEventListener('click', async () => {
  const forgotError = document.getElementById('forgotError');
  const forgotSuccess = document.getElementById('forgotSuccess');
  forgotError.textContent = '';
  forgotSuccess.textContent = '';

  const email = document.getElementById('forgotEmail').value.trim();
  if (!email) {
    forgotError.textContent = 'أدخل إيميلك';
    return;
  }

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/reset-password.html'
  });

  if (error) {
    forgotError.textContent = 'حصل خطأ، حاول تاني';
    return;
  }

  forgotSuccess.textContent = 'تم إرسال رابط إعادة التعيين لإيميلك، افتحه من نفس الجهاز';
});

function showSocialSoon() {
  const msg = document.getElementById('socialSoonMsg');
  msg.textContent = 'تسجيل الدخول عبر هذه الطريقة هيتفعّل قريباً';
  setTimeout(() => { msg.textContent = ''; }, 3000);
}
</script>
</body>
</html>
