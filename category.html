<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التصنيف — RAIZEY STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">RAIZEY <span>STORE</span></div>
    <a href="index.html" class="back-link" style="margin:0;">→ الرئيسية</a>
  </div>
</header>

<div class="section-title" id="categoryTitle" style="font-size:20px; color:var(--ink); font-weight:800; padding:20px 20px 4px;">جارِ التحميل...</div>

<div class="products-grid" id="productsGrid">
  <div class="empty-state">
    <h3>جارِ التحميل...</h3>
  </div>
</div>

<footer class="site-footer">
  <p>© 2026 RAIZEY STORE — جميع الحقوق محفوظة</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const categoryId = params.get('id');

async function init() {
  if (!categoryId) { window.location.href = 'index.html'; return; }

  const rate = await getExchangeRate();

  const { data: category } = await supabaseClient
    .from('categories').select('*').eq('id', categoryId).single();

  document.getElementById('categoryTitle').textContent = category ? category.name : 'التصنيف';

  const { data: products } = await supabaseClient
    .from('products')
    .select('*')
    .eq('category_id', categoryId)
    .eq('is_active', true)
    .order('display_order');

  render((products || []).map(p => ({ ...p, price_sdg: p.price_usd * rate })));
}

function render(products) {
  const grid = document.getElementById('productsGrid');
  if (products.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <h3>لا توجد منتجات في هذا التصنيف حالياً</h3>
      </div>`;
    return;
  }

  grid.innerHTML = products.map(p => `
    <a href="product.html?id=${p.id}" class="voucher-card">
      <div class="voucher-top">
        <div class="voucher-thumb">
          ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}">` : 'لا توجد صورة'}
        </div>
        <div class="voucher-name">${p.name}</div>
      </div>
      <div class="voucher-divider"></div>
      <div class="voucher-bottom">
        <div class="voucher-price">${formatSDG(p.price_sdg)} <small>ج.س</small></div>
        <div class="buy-btn">اشترِ</div>
      </div>
    </a>
  `).join('');
}

init();
</script>
</body>
</html>
