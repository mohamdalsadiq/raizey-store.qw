<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وسائل الدفع — RAIZEY STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/auth.css">
<link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

<div class="admin-page" id="adminPage" style="display:none;">
  <div class="page-header">
    <h1>وسائل الدفع</h1>
    <a href="index.html" class="back-link">→ المتجر</a>
  </div>

  <div class="admin-nav">
    <a href="admin.html">الرئيسية</a>
    <a href="admin-orders.html">الطلبات</a>
    <a href="admin-topups.html">شحن المحافظ</a>
    <a href="admin-products.html">المنتجات</a>
    <a href="admin-categories.html">التصنيفات</a>
    <a href="admin-customers.html">العملاء</a>
    <a href="admin-payment-methods.html" class="active">وسائل الدفع</a>
    <a href="admin-settings.html">الإعدادات</a>
    <a href="admin-audit-log.html">سجل النشاطات</a>
  </div>

  <button class="add-new-btn" id="addNewBtn">+ إضافة وسيلة دفع جديدة</button>

  <div id="methodsList"><div style="color:var(--text-muted); font-size:13px;">جارِ التحميل...</div></div>
</div>

<div class="modal-overlay" id="formModal">
  <div class="modal-box">
    <div class="modal-title" id="formModalTitle">وسيلة دفع جديدة</div>

    <div class="field">
      <label>اسم الوسيلة</label>
      <input type="text" id="nameInput" placeholder="مثلاً: بنكك">
    </div>

    <div class="field">
      <label>بيانات الحساب</label>
      <input type="text" id="accountInput" placeholder="اسم الحساب ورقمه">
    </div>

    <div class="field">
      <label>تعليمات إضافية (اختياري)</label>
      <input type="text" id="instructionsInput" placeholder="مثلاً: ارفع صورة واضحة للإيصال">
    </div>

    <div class="field">
      <label>ترتيب العرض</label>
      <input type="number" id="orderInput" placeholder="0">
    </div>

    <div class="field">
      <label>الحالة</label>
      <select id="activeInput">
        <option value="true">فعّالة (تظهر للعملاء)</option>
        <option value="false">غير فعّالة (مخفية)</option>
      </select>
    </div>

    <div class="form-error" id="formError"></div>

    <div class="modal-actions">
      <button class="modal-cancel-btn" id="formCancelBtn">إلغاء</button>
      <button class="modal-confirm-btn" id="formSaveBtn" style="background:var(--primary); color:#0a1a0a;">حفظ</button>
    </div>
  </div>
</div>

<div id="accessDenied" style="display:none; text-align:center; padding:80px 20px; color:var(--text-muted);">
  <h3 style="color:var(--white); margin-bottom:8px;">غير مصرح لك بالدخول</h3>
  <a href="index.html" style="color:var(--primary); font-weight:700;">← رجوع للمتجر</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
let methods = [];
let editingId = null;

const formModal = document.getElementById('formModal');
const nameInput = document.getElementById('nameInput');
const accountInput = document.getElementById('accountInput');
const instructionsInput = document.getElementById('instructionsInput');
const orderInput = document.getElementById('orderInput');
const activeInput = document.getElementById('activeInput');
const formError = document.getElementById('formError');

async function init() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  const { data: profile } = await supabaseClient
    .from('profiles').select('role').eq('id', session.user.id).single();

  if (!profile || profile.role !== 'admin') {
    document.getElementById('accessDenied').style.display = 'block';
    return;
  }

  document.getElementById('adminPage').style.display = 'block';
  document.getElementById('addNewBtn').addEventListener('click', () => openForm(null));
  document.getElementById('formCancelBtn').addEventListener('click', closeForm);
  document.getElementById('formSaveBtn').addEventListener('click', saveMethod);

  await loadMethods();
}

async function loadMethods() {
  const { data } = await supabaseClient.from('payment_methods').select('*').order('display_order');
  methods = data || [];
  render();
}

function render() {
  const container = document.getElementById('methodsList');
  if (methods.length === 0) {
    container.innerHTML = `<div style="color:var(--text-muted); font-size:13px; text-align:center; padding:30px 0;">لا توجد وسائل دفع بعد</div>`;
    return;
  }

  container.innerHTML = methods.map(m => `
    <div class="manage-item">
      <div class="manage-item-info">
        <div class="manage-item-name">
          ${m.name}
          ${!m.is_active ? '<span class="inactive-badge">مخفي</span>' : ''}
        </div>
        <div class="manage-item-sub">${m.account_info}</div>
      </div>
      <div class="manage-item-actions">
        <button class="icon-action-btn" data-action="edit" data-id="${m.id}">✏️</button>
        <button class="icon-action-btn" data-action="delete" data-id="${m.id}">🗑️</button>
      </div>
    </div>
  `).join('');

  container.querySelectorAll('[data-action="edit"]').forEach(btn => {
    btn.addEventListener('click', () => openForm(btn.dataset.id));
  });
  container.querySelectorAll('[data-action="delete"]').forEach(btn => {
    btn.addEventListener('click', () => deleteMethod(btn.dataset.id));
  });
}

function openForm(id) {
  editingId = id;
  formError.textContent = '';

  if (id) {
    const m = methods.find(x => x.id === id);
    document.getElementById('formModalTitle').textContent = 'تعديل وسيلة الدفع';
    nameInput.value = m.name;
    accountInput.value = m.account_info;
    instructionsInput.value = m.instructions || '';
    orderInput.value = m.display_order;
    activeInput.value = String(m.is_active);
  } else {
    document.getElementById('formModalTitle').textContent = 'وسيلة دفع جديدة';
    nameInput.value = '';
    accountInput.value = '';
    instructionsInput.value = '';
    orderInput.value = methods.length;
    activeInput.value = 'true';
  }

  formModal.classList.add('show');
}

function closeForm() {
  formModal.classList.remove('show');
  editingId = null;
}

async function saveMethod() {
  const name = nameInput.value.trim();
  const account = accountInput.value.trim();

  if (!name) { formError.textContent = 'أدخل اسم الوسيلة'; return; }
  if (!account) { formError.textContent = 'أدخل بيانات الحساب'; return; }

  const payload = {
    name,
    account_info: account,
    instructions: instructionsInput.value.trim() || null,
    display_order: parseInt(orderInput.value) || 0,
    is_active: activeInput.value === 'true'
  };

  const { error } = editingId
    ? await supabaseClient.from('payment_methods').update(payload).eq('id', editingId)
    : await supabaseClient.from('payment_methods').insert(payload);

  if (error) {
    formError.textContent = 'حصل خطأ، حاول تاني';
    return;
  }

  closeForm();
  await loadMethods();
}

async function deleteMethod(id) {
  if (!confirm('متأكد عايز تحذف وسيلة الدفع دي؟')) return;
  await supabaseClient.from('payment_methods').delete().eq('id', id);
  await loadMethods();
}

init();
</script>
</body>
</html>
