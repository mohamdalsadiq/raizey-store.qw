<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة العملاء — RAIZEY STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/auth.css">
<link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

<div class="admin-page" id="adminPage" style="display:none;">
  <div class="page-header">
    <h1>إدارة العملاء</h1>
    <a href="index.html" class="back-link">→ المتجر</a>
  </div>

  <div class="admin-nav">
    <a href="admin.html">الرئيسية</a>
    <a href="admin-orders.html">الطلبات</a>
    <a href="admin-topups.html">شحن المحافظ</a>
    <a href="admin-products.html">المنتجات</a>
    <a href="admin-categories.html">التصنيفات</a>
    <a href="admin-customers.html" class="active">العملاء</a>
    <a href="admin-payment-methods.html">وسائل الدفع</a>
    <a href="admin-settings.html">الإعدادات</a>
  </div>

  <div class="field">
    <input type="text" id="searchInput" placeholder="ابحث بالاسم أو رقم الواتساب">
  </div>

  <div id="customersList" style="margin-top:16px;"><div style="color:var(--text-muted); font-size:13px;">جارِ التحميل...</div></div>
</div>

<div id="accessDenied" style="display:none; text-align:center; padding:80px 20px; color:var(--text-muted);">
  <h3 style="color:var(--white); margin-bottom:8px;">غير مصرح لك بالدخول</h3>
  <a href="index.html" style="color:var(--primary); font-weight:700;">← رجوع للمتجر</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
let allCustomers = [];
let currentUserId = null;

async function init() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  currentUserId = session.user.id;

  const { data: profile } = await supabaseClient
    .from('profiles').select('role').eq('id', session.user.id).single();

  if (!profile || profile.role !== 'admin') {
    document.getElementById('accessDenied').style.display = 'block';
    return;
  }

  document.getElementById('adminPage').style.display = 'block';
  document.getElementById('searchInput').addEventListener('input', render);

  await loadCustomers();
}

async function loadCustomers() {
  const { data } = await supabaseClient
    .from('profiles')
    .select('*, wallets(balance)')
    .order('created_at', { ascending: false });

  allCustomers = data || [];
  render();
}

function render() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = allCustomers.filter(c =>
    (c.full_name || '').toLowerCase().includes(search) ||
    (c.whatsapp_number || '').toLowerCase().includes(search)
  );

  const container = document.getElementById('customersList');
  if (filtered.length === 0) {
    container.innerHTML = `<div style="color:var(--text-muted); font-size:13px; text-align:center; padding:30px 0;">لا يوجد نتائج</div>`;
    return;
  }

  container.innerHTML = filtered.map(c => {
    const balance = c.wallets?.balance ?? 0;
    const isSelf = c.id === currentUserId;
    return `
      <div class="manage-item" style="flex-direction:column; align-items:stretch;">
        <div style="display:flex; align-items:center; gap:12px;">
          <div class="manage-item-info">
            <div class="manage-item-name">
              ${c.full_name || 'بدون اسم'}
              ${c.role === 'admin' ? '<span class="inactive-badge" style="color:var(--primary); background:rgba(43,237,51,0.15);">أدمن</span>' : ''}
              ${c.is_banned ? '<span class="inactive-badge" style="color:var(--danger); background:rgba(255,77,79,0.15);">محظور</span>' : ''}
            </div>
            <div class="manage-item-sub">📱 ${c.whatsapp_number || '—'} — رصيد: ${formatSDG(balance)} ج.س</div>
          </div>
        </div>
        <div class="admin-order-actions">
          ${!isSelf ? `
            <button class="admin-btn ${c.is_banned ? 'btn-confirm' : 'btn-reject'}" data-action="ban" data-id="${c.id}" data-banned="${c.is_banned}">
              ${c.is_banned ? 'إلغاء الحظر' : 'حظر'}
            </button>
            <button class="admin-btn btn-complete" data-action="role" data-id="${c.id}" data-role="${c.role}">
              ${c.role === 'admin' ? 'إلغاء صلاحية الأدمن' : 'ترقية لأدمن'}
            </button>
          ` : '<div style="font-size:12px; color:var(--text-muted); padding:8px;">هذا حسابك</div>'}
        </div>
      </div>
    `;
  }).join('');

  container.querySelectorAll('[data-action="ban"]').forEach(btn => {
    btn.addEventListener('click', () => toggleBan(btn.dataset.id, btn.dataset.banned === 'true'));
  });
  container.querySelectorAll('[data-action="role"]').forEach(btn => {
    btn.addEventListener('click', () => toggleRole(btn.dataset.id, btn.dataset.role));
  });
}

async function toggleBan(id, currentlyBanned) {
  const action = currentlyBanned ? 'إلغاء حظر' : 'حظر';
  if (!confirm(`متأكد عايز ${action} هذا العميل؟`)) return;
  await supabaseClient.from('profiles').update({ is_banned: !currentlyBanned }).eq('id', id);
  await loadCustomers();
}

async function toggleRole(id, currentRole) {
  const newRole = currentRole === 'admin' ? 'customer' : 'admin';
  const msg = newRole === 'admin' ? 'ترقية هذا الحساب لأدمن؟' : 'إلغاء صلاحية الأدمن من هذا الحساب؟';
  if (!confirm(msg)) return;
  await supabaseClient.from('profiles').update({ role: newRole }).eq('id', id);
  await loadCustomers();
}

init();
</script>
</body>
</html>
