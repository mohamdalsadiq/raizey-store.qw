<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كروت الهدايا — RAIZEY STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/auth.css">
<link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

<div class="admin-page" id="adminPage" style="display:none;">
  <div class="page-header">
    <h1>كروت الهدايا</h1>
    <a href="admin.html" class="back-link">→ لوحة التحكم</a>
  </div>

  <div class="field">
    <label>قيمة الكرت (بالجنيه السوداني)</label>
    <input type="number" id="amountInput" placeholder="مثلاً: 5000">
  </div>
  <button class="add-new-btn" id="generateBtn">🎁 توليد كرت جديد</button>

  <div id="giftCardsList"><div style="color:var(--text-muted); font-size:13px;">جارِ التحميل...</div></div>
</div>

<div id="accessDenied" style="display:none; text-align:center; padding:80px 20px; color:var(--text-muted);">
  <h3 style="color:var(--white); margin-bottom:8px;">غير مصرح لك بالدخول</h3>
  <a href="index.html" style="color:var(--primary); font-weight:700;">← رجوع للمتجر</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
async function init() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  const { data: profile } = await supabaseClient
    .from('profiles').select('role').eq('id', session.user.id).single();

  if (!profile || profile.role !== 'admin') {
    document.getElementById('accessDenied').style.display = 'block';
    return;
  }

  document.getElementById('adminPage').style.display = 'block';
  document.getElementById('generateBtn').addEventListener('click', generateCard);

  await loadCards();
}

function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = 'RZ-';
  for (let i = 0; i < 8; i++) {
    if (i === 4) code += '-';
    code += chars[Math.floor(Math.random() * chars.length)];
  }
  return code;
}

async function generateCard() {
  const amount = parseFloat(document.getElementById('amountInput').value);
  if (!amount || amount <= 0) {
    alert('أدخل قيمة صحيحة');
    return;
  }

  const code = generateCode();
  const { error } = await supabaseClient.from('gift_cards').insert({ code, amount });

  if (error) {
    alert('حصل خطأ، حاول تاني');
    return;
  }

  document.getElementById('amountInput').value = '';
  await loadCards();
}

async function loadCards() {
  const { data } = await supabaseClient
    .from('gift_cards')
    .select('*, profiles(full_name)')
    .order('created_at', { ascending: false });

  const container = document.getElementById('giftCardsList');
  if (!data || data.length === 0) {
    container.innerHTML = `<div style="color:var(--text-muted); font-size:13px; text-align:center; padding:30px 0;">لا توجد كروت بعد</div>`;
    return;
  }

  container.innerHTML = data.map(c => `
    <div class="manage-item">
      <div class="manage-item-info">
        <div class="manage-item-name" style="font-family:var(--font-mono);">
          ${c.code}
          ${c.is_redeemed ? '<span class="inactive-badge" style="color:var(--danger); background:rgba(255,77,79,0.15);">مستخدم</span>' : '<span class="inactive-badge" style="color:var(--primary); background:rgba(43,237,51,0.15);">متاح</span>'}
        </div>
        <div class="manage-item-sub">
          ${formatSDG(c.amount)} ج.س
          ${c.is_redeemed ? ' — بواسطة: ' + (c.profiles?.full_name || 'مستخدم') : ''}
        </div>
      </div>
    </div>
  `).join('');
}

init();
</script>
</body>
</html>
