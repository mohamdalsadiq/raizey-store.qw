<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAIZEY STORE — شحن ألعاب وبطاقات رقمية</title>
<meta name="description" content="متجر RAIZEY لشحن شدات ببجي، جواهر فري فاير، بطاقات جوجل بلاي، والاشتراكات الرقمية بأسعار محدثة لحظياً.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">RAIZEY <span>STORE</span></div>
    <div class="header-actions">
      <a href="wallet.html" class="icon-btn" title="المحفظة">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
      </a>
      <a href="notifications.html" class="icon-btn" title="الإشعارات">
        <span class="badge-dot" id="notifDot"></span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
      </a>
      <a href="account.html" class="icon-btn" title="حسابي">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      </a>
    </div>
  </div>
</header>

<section class="hero">
  <div class="container">
    <h1>اشحن رصيدك <span class="glow">فوراً</span><br>بأفضل الأسعار</h1>
    <p>شدات ببجي، جواهر فري فاير، بطاقات جوجل بلاي، والمزيد — تسليم سريع وموثوق</p>
    <div class="hero-rate" id="rateBox">سعر الدولار: جارِ التحميل...</div>
  </div>
</section>

<div class="section-title">التصنيفات</div>
<div class="categories" id="categoriesRow">
  <button class="chip active" data-id="all">الكل</button>
</div>

<div class="section-title" id="productsTitle">المنتجات</div>
<div class="products-grid" id="productsGrid">
  <div class="empty-state">
    <h3>جارِ تحميل المنتجات...</h3>
  </div>
</div>

<footer class="site-footer">
  <p>© 2026 RAIZEY STORE — جميع الحقوق محفوظة</p>
</footer>

<a href="https://wa.me/249901815039" class="whatsapp-fab" target="_blank" title="تواصل واتساب">
  <svg width="26" height="26" viewBox="0 0 24 24" fill="#0a1a0a"><path d="M20.5 3.5A11 11 0 0 0 3 17.7L2 22l4.4-1.2A11 11 0 1 0 20.5 3.5Zm-8.4 16.9a9 9 0 0 1-4.6-1.3l-.3-.2-3 .8.8-2.9-.2-.3a9 9 0 1 1 7.3 3.9Zm5-6.6c-.3-.1-1.6-.8-1.9-.9-.2-.1-.4-.1-.6.1s-.6.9-.8 1c-.1.2-.3.2-.6.1a7.4 7.4 0 0 1-3.6-3.2c-.3-.5.3-.5.8-1.5.1-.2 0-.4 0-.5L9.6 7.1c-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.5.1-.7.3-.2.3-1 1-1 2.3s1 2.7 1.1 2.9c.1.2 2 3 4.8 4.3.7.3 1.2.5 1.6.6.7.2 1.3.2 1.8.1.5-.1 1.6-.7 1.9-1.3.2-.6.2-1.1.2-1.2-.1-.2-.3-.3-.6-.4Z"/></svg>
</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
let allProducts = [];
let currentCategory = 'all';

async function init() {
  const rate = await getExchangeRate();
  document.getElementById('rateBox').textContent = rate > 0
    ? `سعر الدولار: ${formatSDG(rate)} ج.س`
    : 'سعر الدولار: لم يتم تحديده بعد';

  await loadCategories();
  await loadProducts();
}

async function loadCategories() {
  const { data, error } = await supabaseClient
    .from('categories')
    .select('*')
    .eq('is_active', true)
    .order('display_order');

  const row = document.getElementById('categoriesRow');
  if (error || !data || data.length === 0) return;

  data.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.dataset.id = cat.id;
    btn.textContent = cat.name;
    btn.onclick = () => selectCategory(cat.id, btn);
    row.appendChild(btn);
  });

  row.querySelector('.chip').onclick = () => selectCategory('all', row.querySelector('.chip'));
}

function selectCategory(id, btnEl) {
  currentCategory = id;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btnEl.classList.add('active');
  renderProducts();
}

async function loadProducts() {
  const rate = await getExchangeRate();
  const { data, error } = await supabaseClient
    .from('products')
    .select('*')
    .eq('is_active', true)
    .order('display_order');

  if (error || !data) {
    allProducts = [];
  } else {
    allProducts = data.map(p => ({ ...p, price_sdg: p.price_usd * rate }));
  }
  renderProducts();
}

function renderProducts() {
  const grid = document.getElementById('productsGrid');
  const filtered = currentCategory === 'all'
    ? allProducts
    : allProducts.filter(p => p.category_id === currentCategory);

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <h3>لا توجد منتجات متاحة حالياً</h3>
        <p>تابعنا قريباً — بنجهز أفضل العروض ليك</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => `
    <a href="product.html?id=${p.id}" class="voucher-card">
      <div class="voucher-top">
        <div class="voucher-thumb">
          ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}">` : 'لا توجد صورة'}
        </div>
        <div class="voucher-name">${p.name}</div>
      </div>
      <div class="voucher-divider"></div>
      <div class="voucher-bottom">
        <div class="voucher-price">${formatSDG(p.price_sdg)} <small>ج.س</small></div>
        <div class="buy-btn">اشترِ</div>
      </div>
    </a>
  `).join('');
}

init();
</script>
</body>
</html>
