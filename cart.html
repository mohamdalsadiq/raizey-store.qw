<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>سلة المشتريات — RAIZEY STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/auth.css">

<style>
  body { background-color: var(--bg) !important; color: var(--ink) !important; }

  .cart-container {
    padding: 20px;
    max-width: 600px;
    margin: 0 auto;
    box-sizing: border-box;
  }

  .cart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .back-link {
    color: var(--ink);
    text-decoration: none;
    font-size: 14px;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--primary); }

  .cart-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--ink);
    margin: 0 0 20px 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .cart-title i { color: var(--primary); }

  .cart-item-row {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    transition: border-color 0.2s;
  }
  .cart-item-row:hover { border-color: rgba(255, 106, 26, 0.3); }

  .cart-item-thumb {
    width: 65px;
    height: 65px;
    border-radius: 10px;
    overflow: hidden;
    background: var(--bg);
    border: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cart-item-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .cart-item-details { flex: 1; }

  .cart-item-name {
    font-size: 15px;
    font-weight: 800;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .cart-item-meta {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .cart-item-meta span {
    color: var(--primary);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
  }

  .cart-item-price {
    font-size: 13px;
    font-weight: 700;
    color: var(--primary);
    margin-top: 6px;
  }

  .cart-qty-stepper {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }
  .cart-qty-stepper button {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1.5px solid var(--primary);
    background: transparent;
    color: var(--primary);
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    user-select: none;
  }
  .cart-qty-stepper button:active { transform: scale(0.92); }
  .cart-qty-stepper button:disabled { opacity: 0.3; cursor: not-allowed; }
  .cart-qty-stepper .qty-value {
    min-width: 24px;
    text-align: center;
    font-size: 15px;
    font-weight: 900;
    color: var(--ink);
  }

  .remove-item-btn {
    background: transparent;
    border: none;
    color: var(--danger, #ef4444);
    font-size: 16px;
    cursor: pointer;
    padding: 8px;
    border-radius: 8px;
    transition: 0.15s ease;
  }
  .remove-item-btn:hover { background: rgba(239, 68, 68, 0.1); }

  .summary-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 20px 0 16px 0;
  }
  .summary-box .label { font-size: 14px; font-weight: 700; color: var(--ink); }
  .summary-box .total { font-weight: 900; font-size: 20px; color: var(--primary); }

  .btn-proceed-checkout {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    background: var(--primary);
    border: none;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: 0.15s ease;
    text-decoration: none;
  }
  .btn-proceed-checkout:active { transform: scale(0.98); }

  .empty-cart-box {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-top: 20px;
  }
  .empty-cart-icon {
    font-size: 48px;
    color: var(--text-muted);
    opacity: 0.4;
    margin-bottom: 16px;
  }
</style>
</head>
<body>

<div class="cart-container">
  <div class="cart-header">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للمتجر</a>
  </div>
  
  <h1 class="cart-title"><i class="fas fa-shopping-cart"></i> سلة المشتريات</h1>

  <div id="loadingBox" style="text-align:center; padding:40px 0; color:var(--text-muted);">جارِ تحميل السلة...</div>
  
  <div id="cartContent" style="display:none;">
    <!-- قائمة المنتجات المضافة ستظهر هنا -->
    <div id="cartItemsList"></div>

    <div class="summary-box">
      <span class="label">إجمالي السلة:</span>
      <span class="total" id="cartGrandTotal">0 ج.س</span>
    </div>

    <button class="btn-proceed-checkout" id="proceedToCheckoutBtn">
      <span>المتابعة لإتمام الدفع</span>
      <i class="fas fa-arrow-left"></i>
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
let currentUser = null;
let cart = [];
let grandTotal = 0;

function safeFormatSDG(val) {
  if (typeof formatSDG === 'function') return formatSDG(val);
  return Math.round(val).toLocaleString('ar-EG');
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

async function init() {
  try {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      sessionStorage.setItem('redirect_after_login', window.location.href);
      window.location.href = 'login.html';
      return;
    }
    currentUser = session.user;
  } catch (e) {
    console.error('[RAIZEY] Session check error:', e);
  }

  loadCartData();
}

function loadCartData() {
  try {
    cart = JSON.parse(localStorage.getItem('raizey_store_cart')) || [];
  } catch (e) {
    cart = [];
  }
  
  if (cart.length === 0) {
    document.getElementById('loadingBox').style.display = 'none';
    document.getElementById('cartContent').style.display = 'none';
    
    const container = document.querySelector('.cart-container');
    const emptyBox = document.createElement('div');
    emptyBox.className = 'empty-cart-box';
    emptyBox.innerHTML = `
      <div class="empty-cart-icon"><i class="fas fa-shopping-basket"></i></div>
      <h3 style="font-size:18px; font-weight:800; margin-bottom:8px; color:var(--ink);">سلة المشتريات فارغة</h3>
      <p style="font-size:13px; margin-bottom:20px; color:var(--text-muted);">قم بإضافة الباقات والمنتجات التي ترغب بها من المتجر أولاً</p>
      <a href="index.html" class="btn-proceed-checkout" style="display:inline-flex; width:auto; padding: 12px 28px; font-size:14px;"><i class="fas fa-store"></i> تصفح المنتجات</a>
    `;
    container.appendChild(emptyBox);
    return;
  }

  renderCart();
}

function renderCart() {
  document.getElementById('loadingBox').style.display = 'none';
  document.getElementById('cartContent').style.display = 'block';

  const listContainer = document.getElementById('cartItemsList');
  grandTotal = 0;

  listContainer.innerHTML = cart.map((item, index) => {
    const qty = (item.quantity && item.quantity > 0) ? item.quantity : 1;
    const unitPrice = parseFloat(item.price_sdg) || 0;
    const lineSubtotal = unitPrice * qty;
    grandTotal += lineSubtotal;
    
    const metaText = Object.entries(item.field_values || {})
      .map(([key, val]) => `${escapeHtml(key)}: <span>${escapeHtml(val)}</span>`)
      .join(' | ');

    return `
      <div class="cart-item-row">
        <div class="cart-item-thumb">
          ${item.image_url ? `<img src="${escapeHtml(item.image_url)}" alt="${escapeHtml(item.name)}">` : '<i class="fas fa-box-open" style="font-size:20px; color:var(--text-muted);"></i>'}
        </div>
        <div class="cart-item-details">
          <div class="cart-item-name">${escapeHtml(item.name)}</div>
          ${metaText ? `<div class="cart-item-meta">${metaText}</div>` : ''}
          <div class="cart-item-price">${safeFormatSDG(unitPrice)} ج.س &times; ${qty} = <strong>${safeFormatSDG(lineSubtotal)} ج.س</strong></div>
          <div class="cart-qty-stepper">
            <button type="button" onclick="changeQty(${index}, -1)" aria-label="إنقاص الكمية" ${qty <= 1 ? 'disabled' : ''}>&minus;</button>
            <span class="qty-value">${qty}</span>
            <button type="button" onclick="changeQty(${index}, 1)" aria-label="زيادة الكمية">+</button>
          </div>
        </div>
        <button class="remove-item-btn" onclick="removeItem(${index})" title="حذف العنصر">
          <i class="fas fa-trash-can"></i>
        </button>
      </div>
    `;
  }).join('');

  document.getElementById('cartGrandTotal').textContent = `${safeFormatSDG(grandTotal)} ج.س`;

  document.getElementById('proceedToCheckoutBtn').onclick = () => {
    window.location.href = 'checkout.html';
  };
}

function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem('raizey_store_cart', JSON.stringify(cart));
  
  if (cart.length === 0) {
    location.reload();
  } else {
    renderCart();
  }
}

function changeQty(index, delta) {
  const item = cart[index];
  if (!item) return;
  let qty = (item.quantity && item.quantity > 0) ? item.quantity : 1;
  qty += delta;
  if (qty < 1) qty = 1;
  if (qty > 99) qty = 99;
  item.quantity = qty;
  localStorage.setItem('raizey_store_cart', JSON.stringify(cart));
  renderCart();
}

init();
</script>
</body>
</html>
