<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة التصنيفات — RAIZEY STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<!-- 🌐 إضافة مكتبة الأيقونات الاحترافية الفخمة للوحة التحكم -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/auth.css">
<link rel="stylesheet" href="assets/css/admin.css">

<style>
  /* تحسينات بسيطة لأزرار التحكم لتظهر بشكل فخم ومريح للعين */
  .admin-action-btn {
    background: #1a1a1a;
    border: 1px solid #333;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .admin-action-btn:hover {
    border-color: var(--primary);
    background: #222;
  }
  .manage-item-actions {
    display: flex;
    gap: 8px;
  }
  /* ستايل مخصص لعرض صور التصنيفات الاحترافية في القائمة */
  .category-thumb {
    width: 50px;
    height: 50px;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid #333;
    margin-left: 12px;
  }
  .manage-item-info {
    display: flex;
    align-items: center;
  }
  .category-meta-text {
    display: flex;
    flex-direction: column;
  }
</style>
</head>
<body>

<div class="admin-page" id="adminPage" style="display:none;">
  <div class="page-header">
    <h1>إدارة التصنيفات</h1>
    <a href="index.html" class="back-link"><i class="fas fa-store" style="margin-left: 4px;"></i> المتجر</a>
  </div>

  <div class="admin-nav">
    <a href="admin.html">الرئيسية</a>
    <a href="admin-orders.html">الطلبات</a>
    <a href="admin-topups.html">شحن المحافظ</a>
    <a href="admin-products.html">المنتجات</a>
    <a href="admin-categories.html" class="active">التصنيفات</a>
    <a href="admin-customers.html">العملاء</a>
    <a href="admin-payment-methods.html">وسائل الدفع</a>
    <a href="admin-settings.html">الإعدادات</a>
    <a href="admin-audit-log.html">سجل النشاطات</a>
  </div>

  <button class="add-new-btn" id="addNewBtn">+ إضافة تصنيف جديد</button>

  <div id="categoriesList"><div style="color:var(--text-muted); font-size:13px;">جارِ التحميل...</div></div>
</div>

<div class="modal-overlay" id="formModal">
  <div class="modal-box">
    <div class="modal-title" id="formModalTitle">تصنيف جديد</div>

    <div class="field">
      <label>اسم التصنيف</label>
      <input type="text" id="nameInput" placeholder="مثلاً: PUBG Mobile">
    </div>

    <div class="field">
      <label>وصف التصنيف</label>
      <textarea id="descriptionInput" placeholder="اكتب وصفاً مختصراً وفخماً يظهر للعملاء في صفحة الباقات..." rows="3" style="width:100%; background:#111; border:1px solid #333; padding:10px; border-radius:8px; color:#fff; font-family:inherit; resize:vertical;"></textarea>
    </div>

    <div class="field">
      <label>صورة التصنيف (أيقونة اللعبة)</label>
      <input type="file" id="imageFileInput" accept="image/*" style="background:#111; border:1px solid #333; padding:8px; border-radius:8px; width:100%; color:#fff;">
      <input type="hidden" id="imageUrlInput">
      <div id="imageUploadStatus" style="font-size:12px; color:var(--text-muted); margin-top:4px;"></div>
    </div>

    <div class="field">
      <label>ترتيب العرض</label>
      <input type="number" id="orderInput" placeholder="0">
    </div>

    <div class="field">
      <label>نسبة عمولة الإحالة لهذا التصنيف (%)</label>
      <input type="number" id="commissionInput" step="0.1" placeholder="مثلاً: 3">
    </div>

    <div class="field">
      <label>الحالة</label>
      <select id="activeInput">
        <option value="true">فعّال (يظهر للعملاء)</option>
        <option value="false">غير فعّال (مخفي)</option>
      </select>
    </div>

    <div class="form-error" id="formError"></div>

    <div class="modal-actions">
      <button class="modal-cancel-btn" id="formCancelBtn">إلغاء</button>
      <button class="modal-confirm-btn" id="formSaveBtn" style="background:var(--primary); color:#0a1a0a;">حفظ</button>
    </div>
  </div>
</div>

<div id="accessDenied" style="display:none; text-align:center; padding:80px 20px; color:var(--text-muted);">
  <h3 style="color:var(--white); margin-bottom:8px;">غير مصرح لك بالدخول</h3>
  <a href="index.html" style="color:var(--primary); font-weight:700;">← رجوع للمتجر</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
let categories = [];
let editingId = null;

const formModal = document.getElementById('formModal');
const nameInput = document.getElementById('nameInput');
const descriptionInput = document.getElementById('descriptionInput');
const imageFileInput = document.getElementById('imageFileInput');
const imageUrlInput = document.getElementById('imageUrlInput');
const imageUploadStatus = document.getElementById('imageUploadStatus');
const orderInput = document.getElementById('orderInput');
const activeInput = document.getElementById('activeInput');
const formError = document.getElementById('formError');

async function init() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  const { data: profile } = await supabaseClient
    .from('profiles').select('role').eq('id', session.user.id).single();

  if (!profile || profile.role !== 'admin') {
    document.getElementById('accessDenied').style.display = 'block';
    return;
  }

  document.getElementById('adminPage').style.display = 'block';
  document.getElementById('addNewBtn').addEventListener('click', () => openForm(null));
  document.getElementById('formCancelBtn').addEventListener('click', closeForm);
  document.getElementById('formSaveBtn').addEventListener('click', saveCategory);

  await loadCategories();
}

async function loadCategories() {
  const { data } = await supabaseClient
    .from('categories').select('*').order('display_order');
  categories = data || [];
  render();
}

function render() {
  const container = document.getElementById('categoriesList');
  if (categories.length === 0) {
    container.innerHTML = `<div style="color:var(--text-muted); font-size:13px; text-align:center; padding:30px 0;">لا توجد تصنيفات بعد</div>`;
    return;
  }

  container.innerHTML = categories.map(c => {
    const imgHtml = c.image_url 
      ? `<img src="${c.image_url}" class="category-thumb" alt="${c.name}">`
      : `<div class="category-thumb" style="background:#222; display:flex; align-items:center; justify-content:center; color:#555;"><i class="fas fa-gamepad"></i></div>`;

    return `
      <div class="manage-item">
        <div class="manage-item-info">
          ${imgHtml}
          <div class="category-meta-text">
            <div class="manage-item-name">
              ${c.name}
              ${!c.is_active ? '<span class="inactive-badge">مخفي</span>' : ''}
            </div>
            <div class="manage-item-sub">ترتيب: ${c.display_order} — عمولة: ${c.commission_percent}%</div>
          </div>
        </div>
        <div class="manage-item-actions">
          <button data-action="edit" data-id="${c.id}" class="admin-action-btn" title="تعديل">
            <i class="fas fa-pen" style="color:#e0e0e0;"></i>
          </button>
          <button data-action="delete" data-id="${c.id}" class="admin-action-btn" title="حذف">
            <i class="fas fa-trash-can" style="color:#ff3b30;"></i>
          </button>
        </div>
      </div>
    `;
  }).join('');

  container.querySelectorAll('[data-action="edit"]').forEach(btn => {
    btn.addEventListener('click', () => openForm(btn.dataset.id));
  });
  container.querySelectorAll('[data-action="delete"]').forEach(btn => {
    btn.addEventListener('click', () => deleteCategory(btn.dataset.id));
  });
}

function openForm(id) {
  editingId = id;
  formError.textContent = '';
  imageFileInput.value = '';
  imageUploadStatus.textContent = '';

  if (id) {
    const cat = categories.find(c => c.id === id);
    document.getElementById('formModalTitle').textContent = 'تعديل التصنيف';
    nameInput.value = cat.name;
    descriptionInput.value = cat.description || '';
    imageUrlInput.value = cat.image_url || '';
    if (cat.image_url) {
      imageUploadStatus.textContent = 'توجد صورة مرفوعة بالفعل. اختر ملفاً جديداً لاستبدالها.';
    }
    orderInput.value = cat.display_order;
    document.getElementById('commissionInput').value = cat.commission_percent ?? 3;
    activeInput.value = String(cat.is_active);
  } else {
    document.getElementById('formModalTitle').textContent = 'تصنيف جديد';
    nameInput.value = '';
    descriptionInput.value = '';
    imageUrlInput.value = '';
    orderInput.value = categories.length;
    document.getElementById('commissionInput').value = 3;
    activeInput.value = 'true';
  }

  formModal.classList.add('show');
}

function closeForm() {
  formModal.classList.remove('show');
  editingId = null;
}

async function uploadCategoryImageFile(file) {
  imageUploadStatus.textContent = 'جاري رفع الصورة...';
  const fileExt = file.name.split('.').pop();
  const fileName = `categories/${Date.now()}.${fileExt}`;

  const { data, error } = await supabaseClient.storage
    .from('product-images')
    .upload(fileName, file);

  if (error) {
    throw error;
  }

  const { data: publicUrlData } = supabaseClient.storage
    .from('product-images')
    .getPublicUrl(fileName);

  return publicUrlData.publicUrl;
}

async function saveCategory() {
  const name = nameInput.value.trim();
  const description = descriptionInput.value.trim();
  const order = parseInt(orderInput.value) || 0;
  const isActive = activeInput.value === 'true';

  if (!name) {
    formError.textContent = 'أدخل اسم التصنيف';
    return;
  }

  document.getElementById('formSaveBtn').disabled = true;
  document.getElementById('formSaveBtn').textContent = 'جاري الحفظ...';

  try {
    let finalImageUrl = imageUrlInput.value;

    if (imageFileInput.files.length > 0) {
      finalImageUrl = await uploadCategoryImageFile(imageFileInput.files[0]);
    }

    const payload = {
      name,
      description,
      image_url: finalImageUrl,
      display_order: order,
      commission_percent: parseFloat(document.getElementById('commissionInput').value) || 3,
      is_active: isActive
    };

    const { error } = editingId
      ? await supabaseClient.from('categories').update(payload).eq('id', editingId)
      : await supabaseClient.from('categories').insert(payload);

    if (error) {
      formError.textContent = 'حصل خطأ أثناء حفظ التصنيف، حاول تاني';
      return;
    }

    closeForm();
    await loadCategories();
  } catch (err) {
    console.error(err);
    formError.textContent = 'خطأ في رفع الصورة: ' + err.message;
  } finally {
    document.getElementById('formSaveBtn').disabled = false;
    document.getElementById('formSaveBtn').textContent = 'حفظ';
    document.getElementById('formSaveBtn').style.background = 'var(--primary)';
  }
}

async function deleteCategory(id) {
  if (!confirm('متأكد عايز تحذف التصنيف ده؟ المنتجات المرتبطة بيه هتفضل بدون تصنيف.')) return;
  await supabaseClient.from('categories').delete().eq('id', id);
  await loadCategories();
}

init();
</script>
</body>
</html>
