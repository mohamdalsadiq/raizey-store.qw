<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب — RAIZEY STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">RAIZEY <span>STORE</span></div>
    <h1 class="auth-title">إنشاء حساب جديد</h1>
    <p class="auth-sub">سجل عشان تقدر تشحن وتتابع طلباتك</p>

    <form id="registerForm">
      <div class="field">
        <label>الاسم الكامل</label>
        <input type="text" id="fullName" required placeholder="اسمك">
      </div>

      <div class="field">
        <label>البريد الإلكتروني</label>
        <input type="email" id="email" required placeholder="example@email.com">
      </div>

      <div class="field">
        <label>رقم الواتساب</label>
        <input type="tel" id="whatsapp" required placeholder="+2499XXXXXXXX">
      </div>

      <div class="field">
        <label>كلمة السر</label>
        <input type="password" id="password" required placeholder="8 أحرف على الأقل" minlength="8">
      </div>

      <div class="field">
        <label>تأكيد كلمة السر</label>
        <input type="password" id="confirmPassword" required placeholder="أعد كتابة كلمة السر">
      </div>

      <div class="form-error" id="formError"></div>

      <button type="submit" class="auth-btn" id="submitBtn">إنشاء الحساب</button>
    </form>

    <p class="auth-switch">عندك حساب بالفعل؟ <a href="login.html">سجّل دخولك</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
const form = document.getElementById('registerForm');
const errorBox = document.getElementById('formError');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorBox.textContent = '';

  const fullName = document.getElementById('fullName').value.trim();
  const email = document.getElementById('email').value.trim();
  const whatsapp = document.getElementById('whatsapp').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (password !== confirmPassword) {
    errorBox.textContent = 'كلمة السر غير متطابقة';
    return;
  }
  if (password.length < 8) {
    errorBox.textContent = 'كلمة السر لازم تكون 8 أحرف على الأقل';
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'جارِ الإنشاء...';

  const { data, error } = await supabaseClient.auth.signUp({
    email,
    password,
    options: {
      data: { full_name: fullName }
    }
  });

  if (error) {
    errorBox.textContent = translateError(error.message);
    submitBtn.disabled = false;
    submitBtn.textContent = 'إنشاء الحساب';
    return;
  }

  if (data.user) {
    await supabaseClient
      .from('profiles')
      .update({ whatsapp_number: whatsapp })
      .eq('id', data.user.id);
  }

  sessionStorage.setItem('pending_email', email);
  window.location.href = 'verify.html';
});

function translateError(msg) {
  if (msg.includes('already registered')) return 'الإيميل ده مسجل بالفعل، جرب تسجل دخول';
  if (msg.includes('Password')) return 'كلمة السر ضعيفة أو قصيرة جداً';
  if (msg.includes('rate limit')) return 'محاولات كتيرة، حاول بعد شوية';
  return 'حصل خطأ، حاول تاني';
}
</script>
</body>
</html>
