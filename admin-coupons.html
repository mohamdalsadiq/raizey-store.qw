<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الكوبونات — RAIZEY STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/auth.css">
<link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

<div class="admin-page" id="adminPage" style="display:none;">
  <div class="page-header">
    <h1>الكوبونات</h1>
    <a href="admin.html" class="back-link">→ لوحة التحكم</a>
  </div>

  <button class="add-new-btn" id="addNewBtn">+ إنشاء كوبون جديد</button>

  <div id="couponsList"><div style="color:var(--text-muted); font-size:13px;">جارِ التحميل...</div></div>
</div>

<div class="modal-overlay" id="formModal">
  <div class="modal-box">
    <div class="modal-title" id="formModalTitle">كوبون جديد</div>

    <div class="field">
      <label>كود الكوبون</label>
      <input type="text" id="codeInput" placeholder="مثلاً: RAIZEY10" style="text-transform:uppercase;">
    </div>

    <div class="field">
      <label>نسبة الخصم (%)</label>
      <input type="number" id="discountInput" placeholder="10">
    </div>

    <div class="field">
      <label>الحد الأقصى للاستخدام (اختياري، اتركه فارغاً لعدد غير محدود)</label>
      <input type="number" id="maxUsesInput" placeholder="مثلاً: 50">
    </div>

    <div class="field">
      <label>تاريخ الانتهاء (اختياري)</label>
      <input type="date" id="expiresInput">
    </div>

    <div class="field">
      <label>الحالة</label>
      <select id="activeInput">
        <option value="true">فعّال</option>
        <option value="false">معطّل</option>
      </select>
    </div>

    <div class="form-error" id="formError"></div>

    <div class="modal-actions">
      <button class="modal-cancel-btn" id="formCancelBtn">إلغاء</button>
      <button class="modal-confirm-btn" id="formSaveBtn" style="background:var(--primary); color:var(--ink);">حفظ</button>
    </div>
  </div>
</div>

<div id="accessDenied" style="display:none; text-align:center; padding:80px 20px; color:var(--text-muted);">
  <h3 style="color:var(--ink); margin-bottom:8px;">غير مصرح لك بالدخول</h3>
  <a href="index.html" style="color:var(--primary); font-weight:700;">← رجوع للمتجر</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
let coupons = [];
let editingId = null;

const formModal = document.getElementById('formModal');
const codeInput = document.getElementById('codeInput');
const discountInput = document.getElementById('discountInput');
const maxUsesInput = document.getElementById('maxUsesInput');
const expiresInput = document.getElementById('expiresInput');
const activeInput = document.getElementById('activeInput');
const formError = document.getElementById('formError');

async function init() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  const { data: profile } = await supabaseClient
    .from('profiles').select('role').eq('id', session.user.id).single();

  if (!profile || profile.role !== 'admin') {
    document.getElementById('accessDenied').style.display = 'block';
    return;
  }

  document.getElementById('adminPage').style.display = 'block';
  document.getElementById('addNewBtn').addEventListener('click', () => openForm(null));
  document.getElementById('formCancelBtn').addEventListener('click', closeForm);
  document.getElementById('formSaveBtn').addEventListener('click', saveCoupon);

  await loadCoupons();
}

async function loadCoupons() {
  const { data } = await supabaseClient.from('coupons').select('*').order('created_at', { ascending: false });
  coupons = data || [];
  render();
}

function render() {
  const container = document.getElementById('couponsList');
  if (coupons.length === 0) {
    container.innerHTML = `<div style="color:var(--text-muted); font-size:13px; text-align:center; padding:30px 0;">لا توجد كوبونات بعد</div>`;
    return;
  }

  container.innerHTML = coupons.map(c => `
    <div class="manage-item">
      <div class="manage-item-info">
        <div class="manage-item-name">
          ${c.code}
          ${!c.is_active ? '<span class="inactive-badge">معطّل</span>' : ''}
        </div>
        <div class="manage-item-sub">
          خصم ${c.discount_percent}% — استُخدم ${c.uses_count}${c.max_uses ? ' / ' + c.max_uses : ''}
          ${c.expires_at ? ' — ينتهي ' + new Date(c.expires_at).toLocaleDateString('ar-EG') : ''}
        </div>
      </div>
      <div class="manage-item-actions">
        <button class="icon-action-btn" data-action="edit" data-id="${c.id}"><i class="fas fa-pen"></i></button>
        <button class="icon-action-btn" data-action="delete" data-id="${c.id}"><i class="fas fa-trash-can"></i></button>
      </div>
    </div>
  `).join('');

  container.querySelectorAll('[data-action="edit"]').forEach(btn => {
    btn.addEventListener('click', () => openForm(btn.dataset.id));
  });
  container.querySelectorAll('[data-action="delete"]').forEach(btn => {
    btn.addEventListener('click', () => deleteCoupon(btn.dataset.id));
  });
}

function openForm(id) {
  editingId = id;
  formError.textContent = '';

  if (id) {
    const c = coupons.find(x => x.id === id);
    document.getElementById('formModalTitle').textContent = 'تعديل الكوبون';
    codeInput.value = c.code;
    discountInput.value = c.discount_percent;
    maxUsesInput.value = c.max_uses || '';
    expiresInput.value = c.expires_at ? c.expires_at.slice(0, 10) : '';
    activeInput.value = String(c.is_active);
  } else {
    document.getElementById('formModalTitle').textContent = 'كوبون جديد';
    codeInput.value = '';
    discountInput.value = '';
    maxUsesInput.value = '';
    expiresInput.value = '';
    activeInput.value = 'true';
  }

  formModal.classList.add('show');
}

function closeForm() {
  formModal.classList.remove('show');
  editingId = null;
}

async function saveCoupon() {
  const code = codeInput.value.trim().toUpperCase();
  const discount = parseFloat(discountInput.value);
  const maxUses = maxUsesInput.value ? parseInt(maxUsesInput.value) : null;
  const expiresAt = expiresInput.value ? new Date(expiresInput.value).toISOString() : null;

  if (!code) { formError.textContent = 'أدخل كود الكوبون'; return; }
  if (!discount || discount <= 0 || discount > 100) { formError.textContent = 'أدخل نسبة خصم صحيحة (1-100)'; return; }

  const payload = {
    code,
    discount_percent: discount,
    max_uses: maxUses,
    expires_at: expiresAt,
    is_active: activeInput.value === 'true'
  };

  const { error } = editingId
    ? await supabaseClient.from('coupons').update(payload).eq('id', editingId)
    : await supabaseClient.from('coupons').insert(payload);

  if (error) {
    formError.textContent = error.message.includes('duplicate') ? 'الكود ده مستخدم بالفعل' : 'حصل خطأ، حاول تاني';
    return;
  }

  closeForm();
  await loadCoupons();
}

async function deleteCoupon(id) {
  if (!confirm('متأكد عايز تحذف الكوبون ده؟')) return;
  await supabaseClient.from('coupons').delete().eq('id', id);
  await loadCoupons();
}

init();
</script>
</body>
</html>
