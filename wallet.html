<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محفظتي — RAIZEY STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>

<div class="orders-page">
  <div class="page-header">
    <h1>محفظتي</h1>
    <a href="index.html" class="back-link">→ المتجر</a>
  </div>

  <div class="wallet-balance-card">
    <div class="wallet-balance-label">رصيدك الحالي</div>
    <div class="wallet-balance-amount" id="balanceAmount">...</div>
  </div>

  <button class="topup-toggle-btn" id="toggleFormBtn">+ اطلب شحن رصيد</button>

  <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:20px;">
    <div class="section-label" style="margin-top:0;">عندك كود هدية؟</div>
    <div style="display:flex; gap:8px;">
      <input type="text" id="giftCodeInput" placeholder="اكتب الكود هنا" style="flex:1; padding:12px 14px; border-radius:10px; border:1px solid var(--border); background:var(--bg); color:var(--ink); font-family:var(--font-mono); font-size:13px;">
      <button id="redeemGiftBtn" style="padding:0 18px; border-radius:10px; background:var(--primary); color:var(--ink); font-weight:800; font-size:13px;">استبدال</button>
    </div>
    <div id="giftMessage" style="font-size:12px; margin-top:8px;"></div>
  </div>

  <div class="topup-form" id="topupForm">
    <div class="field">
      <label>المبلغ (بالجنيه السوداني)</label>
      <input type="number" id="amountInput" min="1" placeholder="مثلاً: 5000">
    </div>

    <div class="field">
      <label>وسيلة التحويل</label>
      <select id="methodSelect">
        <option value="">-- اختر --</option>
      </select>
    </div>

    <div id="methodDetails" style="font-size:13px; color:var(--text-muted); margin-bottom:14px;"></div>

    <div class="field">
      <label>رقم العملية (من رسالة التحويل) *</label>
      <input type="text" id="transactionRefInput" placeholder="مثلاً: FT2507191234">
    </div>

    <!-- قبول صور الإيصال فقط (JPG/PNG/WEBP) -->
    <div class="file-upload" id="fileUploadBox">
      اضغط لرفع صورة الإيصال (JPG / PNG / WEBP)
      <input type="file" id="receiptInput" accept="image/jpeg,image/jpg,image/png,image/webp" style="display:none;">
    </div>
    <div id="fileError" style="font-size:12px; color:var(--danger); margin-top:6px;"></div>

    <div class="form-error" id="formError" style="margin-top:10px;"></div>

    <button class="auth-btn" id="submitTopupBtn" style="margin-top:10px;">إرسال طلب الشحن</button>
  </div>

  <div class="section-label">سجل الشحن</div>
  <div id="topupsList">
    <div style="text-align:center; padding:30px 0; color:var(--text-muted);">جارِ التحميل...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
let currentUser = null;
let paymentMethods = [];
let receiptFile = null;

const statusLabels = { pending: 'قيد المراجعة', confirmed: 'مؤكد', rejected: 'مرفوض' };

async function init() {
  try {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      window.location.href = 'login.html';
      return;
    }
    currentUser = session.user;
  } catch (e) {
    alert('خطأ في التحقق من الجلسة، يرجى تحديث الصفحة.');
    return;
  }

  await Promise.all([loadBalance(), loadPaymentMethods(), loadTopups()]);

  document.getElementById('toggleFormBtn').addEventListener('click', () => {
    document.getElementById('topupForm').classList.toggle('show');
  });

  document.getElementById('methodSelect').addEventListener('change', (e) => {
    const method = paymentMethods.find(m => m.id === e.target.value);
    const box = document.getElementById('methodDetails');
    if (!method) { box.innerHTML = ''; return; }
    box.innerHTML = `
      <div style="display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:6px;">
        <span>اسم الحساب: ${escapeHtml(method.account_name || '')}</span>
        <button type="button" class="copy-account-btn" data-copy="${escapeHtml(method.account_name || '')}">نسخ</button>
      </div>
      <div style="display:flex; align-items:center; justify-content:space-between; gap:8px;">
        <span>رقم الحساب: ${escapeHtml(method.account_number || '')}</span>
        <button type="button" class="copy-account-btn" data-copy="${escapeHtml(method.account_number || '')}">نسخ</button>
      </div>
      ${method.instructions ? `<div style="margin-top:6px;">${escapeHtml(method.instructions)}</div>` : ''}
    `;
    box.querySelectorAll('.copy-account-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(btn.dataset.copy);
          const original = btn.textContent;
          btn.textContent = 'تم النسخ'; btn.classList.add('copied');
          setTimeout(() => { btn.textContent = original; btn.classList.remove('copied'); }, 1800);
        } catch (err) {}
      });
    });
  });

  // ── فحص الملف فور الاختيار (MIME + حجم + صورة صحيحة) ──
  const fileBox = document.getElementById('fileUploadBox');
  const fileInput = document.getElementById('receiptInput');
  const fileError = document.getElementById('fileError');

  fileBox.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', async () => {
    fileError.textContent = '';
    if (fileInput.files.length === 0) return;
    const file = fileInput.files[0];
    const validation = await validateReceiptImage(file);
    if (!validation.valid) {
      fileInput.value = '';
      receiptFile = null;
      fileBox.textContent = 'اضغط لرفع صورة الإيصال (JPG / PNG / WEBP)';
      fileBox.classList.remove('has-file');
      fileError.textContent = validation.message;
      return;
    }
    receiptFile = file;
    fileBox.textContent = escapeHtml(receiptFile.name);
    fileBox.classList.add('has-file');
  });

  document.getElementById('submitTopupBtn').addEventListener('click', submitTopup);
  document.getElementById('redeemGiftBtn').addEventListener('click', redeemGiftCard);
}

async function redeemGiftCard() {
  const code = document.getElementById('giftCodeInput').value.trim().toUpperCase();
  const msgBox = document.getElementById('giftMessage');
  msgBox.style.color = '';

  if (!code) {
    msgBox.style.color = 'var(--danger)';
    msgBox.textContent = 'اكتب الكود الأول';
    return;
  }

  try {
    const { data, error } = await supabaseClient.rpc('redeem_gift_card', { p_code: code });

    if (error) {
      msgBox.style.color = 'var(--danger)';
      msgBox.textContent = (error.message || '').includes('already_redeemed')
        ? 'الكود ده مستخدم بالفعل'
        : 'الكود غير صحيح';
      return;
    }

    msgBox.style.color = 'var(--primary)';
    msgBox.textContent = `تم إضافة ${formatSDG(data)} ج.س لرصيدك`;
    document.getElementById('giftCodeInput').value = '';
    await loadBalance();
  } catch (e) {
    msgBox.style.color = 'var(--danger)';
    msgBox.textContent = 'حصل خطأ أثناء استبدال الكود، حاول مرة أخرى.';
  }
}

async function loadBalance() {
  try {
    const { data } = await supabaseClient
      .from('wallets')
      .select('balance')
      .eq('user_id', currentUser.id)
      .single();
    document.getElementById('balanceAmount').innerHTML = `${formatSDG(data ? data.balance : 0)} <small>ج.س</small>`;
  } catch (e) {
    document.getElementById('balanceAmount').textContent = '—';
  }
}

async function loadPaymentMethods() {
  try {
    const { data } = await supabaseClient
      .from('payment_methods')
      .select('*')
      .eq('is_active', true);
    paymentMethods = data || [];

    const select = document.getElementById('methodSelect');
    paymentMethods.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.name;
      select.appendChild(opt);
    });
  } catch (e) {
    console.error('[RAIZEY] loadPaymentMethods error:', e);
  }
}

async function loadTopups() {
  try {
    const { data: topups, error } = await supabaseClient
      .from('wallet_topups')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: false });

    const container = document.getElementById('topupsList');

    if (error || !topups || topups.length === 0) {
      container.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-muted);">لا يوجد طلبات شحن بعد</div>`;
      return;
    }

    container.innerHTML = topups.map(t => {
      const date = new Date(t.created_at).toLocaleDateString('ar-EG', {
        year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
      return `
        <div class="order-card">
          <div class="order-top">
            <div>
              <div class="order-product">${formatSDG(t.amount)} ج.س</div>
              <div class="order-date">${date}</div>
            </div>
            <span class="status-badge status-${escapeHtml(t.status)}">${escapeHtml(statusLabels[t.status] || t.status)}</span>
          </div>
          ${t.status === 'rejected' && t.rejection_reason ? `
            <div class="order-rejection">سبب الرفض: ${escapeHtml(t.rejection_reason)}</div>
          ` : ''}
        </div>
      `;
    }).join('');
  } catch (e) {
    document.getElementById('topupsList').innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-muted);">تعذّر تحميل سجل الشحن.</div>`;
  }
}

async function submitTopup() {
  const errorBox = document.getElementById('formError');
  const fileError = document.getElementById('fileError');
  errorBox.textContent = '';
  fileError.textContent = '';

  const amount = parseFloat(document.getElementById('amountInput').value);
  const methodId = document.getElementById('methodSelect').value;

  if (!amount || amount <= 0) {
    errorBox.textContent = 'أدخل مبلغ صحيح';
    return;
  }
  if (!methodId) {
    errorBox.textContent = 'اختر وسيلة التحويل';
    return;
  }
  if (!receiptFile) {
    errorBox.textContent = 'ارفع صورة الإيصال';
    return;
  }
  const transactionRef = document.getElementById('transactionRefInput').value.trim();
  if (!transactionRef) {
    errorBox.textContent = 'اكتب رقم العملية من رسالة التحويل';
    return;
  }

  // ── فحص إضافي قبل الرفع (تأكيد نوع MIME وحجم الملف) ──
  const validation = await validateReceiptImage(receiptFile);
  if (!validation.valid) {
    fileError.textContent = validation.message;
    return;
  }

  const submitBtn = document.getElementById('submitTopupBtn');
  submitBtn.disabled = true;
  submitBtn.textContent = 'جارِ التحقق...';

  // ── فحص تكرار بصمة الملف ورقم العملية قبل الرفع ──
  let receiptHash = null;
  try {
    receiptHash = await hashFile(receiptFile);
  } catch (e) {
    errorBox.textContent = 'فشل معالجة الملف، يرجى المحاولة مجدداً.';
    submitBtn.disabled = false;
    submitBtn.textContent = 'إرسال طلب الشحن';
    return;
  }

  const [isDuplicateHash, isDuplicateRef] = await Promise.all([
    checkDuplicateReceipt('wallet_topups', receiptHash),
    checkDuplicateTransactionRef('wallet_topups', transactionRef)
  ]);

  if (isDuplicateHash || isDuplicateRef) {
    try {
      await supabaseClient.from('audit_logs').insert({
        admin_id: null,
        action: 'تنبيه احتيال: إيصال أو رقم عملية مكرر (wallet topup)',
        details: { user_id: currentUser.id, receipt_hash: receiptHash, transaction_ref: transactionRef }
      });
    } catch (e) {}
    errorBox.style.color = 'var(--danger)';
    errorBox.textContent = isDuplicateRef
      ? 'رقم العملية هذا تم استخدامه في طلب شحن سابق!'
      : 'هذا الإيصال مستخدم من قبل في طلب سابق. تم رفض طلب الشحن تلقائياً.';
    submitBtn.disabled = false;
    submitBtn.textContent = 'إرسال طلب الشحن';
    return;
  }

  // ── رفع الإيصال إلى Storage ──
  submitBtn.textContent = 'جارِ رفع الإيصال...';
  const fileExt = receiptFile.name.split('.').pop().toLowerCase();
  const filePath = `${currentUser.id}/topup_${Date.now()}.${fileExt}`;

  const { error: uploadError } = await supabaseClient.storage
    .from('receipts')
    .upload(filePath, receiptFile, { contentType: receiptFile.type, upsert: false });

  if (uploadError) {
    errorBox.textContent = 'فشل رفع الإيصال — ' + (uploadError.message || 'حاول مرة أخرى');
    submitBtn.disabled = false;
    submitBtn.textContent = 'إرسال طلب الشحن';
    return;
  }

  const { data: urlData } = supabaseClient.storage.from('receipts').getPublicUrl(filePath);

  // ── إدخال طلب الشحن ──
  try {
    const { error } = await supabaseClient.from('wallet_topups').insert({
      user_id:               currentUser.id,
      amount,
      payment_method_id:     methodId,
      receipt_url:           urlData.publicUrl,
      receipt_hash:          receiptHash,
      transaction_reference: transactionRef,
      status:                'pending',
    });

    if (error) {
      throw error;
    }
  } catch (e) {
    const errMsg = e.message || String(e);
    console.error('[RAIZEY] wallet_topups insert error:', e);
    errorBox.textContent = 'حصل خطأ أثناء إرسال الطلب: ' + errMsg;
    submitBtn.disabled = false;
    submitBtn.textContent = 'إرسال طلب الشحن';
    return;
  }

  // إعادة ضبط النموذج بعد النجاح
  document.getElementById('topupForm').classList.remove('show');
  document.getElementById('amountInput').value = '';
  document.getElementById('methodSelect').value = '';
  document.getElementById('transactionRefInput').value = '';
  document.getElementById('methodDetails').innerHTML = '';
  const fBox = document.getElementById('fileUploadBox');
  fBox.textContent = 'اضغط لرفع صورة الإيصال (JPG / PNG / WEBP)';
  fBox.classList.remove('has-file');
  receiptFile = null;
  submitBtn.disabled = false;
  submitBtn.textContent = 'إرسال طلب الشحن';

  await loadTopups();
}

init();
</script>
</body>
</html>
