<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة المنتجات — RAIZEY STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/auth.css">
<link rel="stylesheet" href="assets/css/admin.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="admin-page" id="adminPage" style="display:none;">
  <div class="page-header">
    <h1>إدارة المنتجات</h1>
    <a href="index.html" class="back-link">→ المتجر</a>
  </div>

  <div class="admin-nav">
    <a href="admin.html">الرئيسية</a>
    <a href="admin-orders.html">الطلبات</a>
    <a href="admin-topups.html">شحن المحافظ</a>
    <a href="admin-products.html" class="active">المنتجات</a>
    <a href="admin-categories.html">التصنيفات</a>
    <a href="admin-customers.html">العملاء</a>
    <a href="admin-payment-methods.html">وسائل الدفع</a>
    <a href="admin-settings.html">الإعدادات</a>
    <a href="admin-audit-log.html">سجل النشاطات</a>
    <a href="admin-referral-milestones.html">مستويات الإحالة</a>
  </div>

  <button class="add-new-btn" id="addNewBtn">+ إضافة منتج جديد</button>

  <div id="productsList"><div style="color:var(--text-muted); font-size:13px;">جارِ التحميل...</div></div>
</div>

<div class="modal-overlay" id="formModal">
  <div class="modal-box" style="max-height:85vh; overflow-y:auto;">
    <div class="modal-title" id="formModalTitle">منتج جديد</div>

    <div class="field">
      <label>التصنيف</label>
      <select id="categoryInput"></select>
    </div>

    <div class="field">
      <label>اسم المنتج</label>
      <input type="text" id="nameInput" placeholder="مثلاً: 60 UC أو حساب توثيق">
    </div>

    <div class="field">
      <label>الوصف المختصر (اختياري)</label>
      <input type="text" id="descInput" placeholder="وصف مختصر يظهر في القائمة">
    </div>

    <div class="field">
      <label>شرح المنتج / طريقة الاستلام والتنبيهات (يظهر للعميل في صفحة المنتج)</label>
      <textarea id="instructionsInput" placeholder="اكتب هنا شرحاً مفصلاً للمنتج، طريقة الاستلام، أو أي تنبيهات تهم العميل..." style="width: 100%; min-height: 110px; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--ink); font-family: 'Tajawal', sans-serif; font-size: 14px; resize: vertical; line-height: 1.6;"></textarea>
    </div>

    <div class="field">
      <label>صورة المنتج</label>
      <div class="file-upload" id="fileUploadBox">
        اضغط لرفع صورة
        <input type="file" id="imageFileInput" accept="image/*" style="display:none;">
      </div>
      <input type="hidden" id="imageInput">
    </div>

    <div class="field">
      <label>السعر الأساسي (بالدولار $)</label>
      <input type="number" id="priceInput" step="0.01" placeholder="1.00">
    </div>

    <!-- قسم الخيارات الفرعية للمنتج -->
    <div class="field" style="margin-top: 15px; border-top: 1px dashed var(--border); padding-top: 15px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <label style="font-weight: 800; margin: 0; color: var(--ink); display: flex; align-items: center; gap: 6px;">
          <i class="fas fa-list-check" style="color: var(--primary);"></i>
          إضافة خيارات فرعية للمنتج
        </label>
        <input type="checkbox" id="hasOptionsToggle" style="width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary);">
      </div>

      <div id="optionsContainer" style="display: none; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-top: 10px;">
        <label style="display:block; font-size:12px; font-weight:600; margin-bottom:10px; color:var(--text-muted);">
          أدخل الخيارات وسعر كل خيار ($). سيكون اختيار أحد الخيارات إجبارياً على الزبون عند الشراء.
        </label>
        <div id="optionsBuilder"></div>
        <button class="add-field-btn" id="addOptionBtn" type="button" style="margin-top: 8px;">
          <i class="fas fa-plus"></i> إضافة خيار جديد
        </button>
      </div>
    </div>

    <div class="field">
      <label>ترتيب العرض</label>
      <input type="number" id="orderInput" placeholder="0">
    </div>

    <div class="field">
      <label>الحالة</label>
      <select id="activeInput">
        <option value="true">فعّال (يظهر للعملاء)</option>
        <option value="false">غير فعّال (مخفي)</option>
      </select>
    </div>

    <label style="display:block; font-size:13px; font-weight:600; margin-bottom:8px; color:var(--text-muted);">
      البيانات المطلوبة من العميل عند الشراء (يتم تحديد العنوان والنص الداخلي)
    </label>
    <div id="fieldsBuilder"></div>
    <button class="add-field-btn" id="addFieldBtn" type="button">+ إضافة حقل مطلوب</button>

    <div class="form-error" id="formError"></div>

    <div class="modal-actions">
      <button class="modal-cancel-btn" id="formCancelBtn">إلغاء</button>
      <button class="modal-confirm-btn" id="formSaveBtn" style="background:var(--primary); color:var(--ink);">حفظ</button>
    </div>
  </div>
</div>

<div id="accessDenied" style="display:none; text-align:center; padding:80px 20px; color:var(--text-muted);">
  <h3 style="color:var(--ink); margin-bottom:8px;">غير مصرح لك بالدخول</h3>
  <a href="index.html" style="color:var(--primary); font-weight:700;">← رجوع للمتجر</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
let products = [];
let categories = [];
let editingId = null;

const formModal = document.getElementById('formModal');
const categoryInput = document.getElementById('categoryInput');
const nameInput = document.getElementById('nameInput');
const descInput = document.getElementById('descInput');
const instructionsInput = document.getElementById('instructionsInput');
const imageInput = document.getElementById('imageInput');
const priceInput = document.getElementById('priceInput');
const orderInput = document.getElementById('orderInput');
const activeInput = document.getElementById('activeInput');
const formError = document.getElementById('formError');
const fieldsBuilder = document.getElementById('fieldsBuilder');

// عناصر ميزة الخيارات الفرعية
const hasOptionsToggle = document.getElementById('hasOptionsToggle');
const optionsContainer = document.getElementById('optionsContainer');
const optionsBuilder = document.getElementById('optionsBuilder');
const addOptionBtn = document.getElementById('addOptionBtn');

async function init() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  const { data: profile } = await supabaseClient
    .from('profiles').select('role').eq('id', session.user.id).single();

  if (!profile || profile.role !== 'admin') {
    document.getElementById('accessDenied').style.display = 'block';
    return;
  }

  document.getElementById('adminPage').style.display = 'block';
  document.getElementById('addNewBtn').addEventListener('click', () => openForm(null));
  document.getElementById('formCancelBtn').addEventListener('click', closeForm);
  document.getElementById('formSaveBtn').addEventListener('click', saveProduct);
  document.getElementById('addFieldBtn').addEventListener('click', () => addFieldRow('', '', ''));

  // أحداث الخيارات الفرعية
  hasOptionsToggle.addEventListener('change', () => toggleOptionsSection(hasOptionsToggle.checked));
  addOptionBtn.addEventListener('click', () => addOptionRow('', '', ''));

  const fileBox = document.getElementById('fileUploadBox');
  const fileInput = document.getElementById('imageFileInput');
  fileBox.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', async () => {
    if (fileInput.files.length === 0) return;
    const file = fileInput.files[0];
    fileBox.textContent = 'جارِ الرفع...';

    const fileExt = file.name.split('.').pop();
    const filePath = `${Date.now()}-${Math.random().toString(36).slice(2)}.${fileExt}`;

    const { error } = await supabaseClient.storage.from('product-images').upload(filePath, file);
    if (error) {
      fileBox.textContent = 'فشل الرفع، اضغط للمحاولة تاني';
      return;
    }

    const { data: urlData } = supabaseClient.storage.from('product-images').getPublicUrl(filePath);
    document.getElementById('imageInput').value = urlData.publicUrl;
    fileBox.textContent = `${file.name}`;
    fileBox.classList.add('has-file');
  });

  await loadCategories();
  await loadProducts();
}

// التحكم بظهور وإخفاء قسم الخيارات
function toggleOptionsSection(show) {
  optionsContainer.style.display = show ? 'block' : 'none';
  if (show && optionsBuilder.children.length === 0) {
    addOptionRow('', '', '');
    addOptionRow('', '', '');
  }
}

// إضافة سطر خيار فرعي مع الحفاظ على المرفق الفريد (ID)
function addOptionRow(label = '', price = '', id = '') {
  const row = document.createElement('div');
  row.className = 'option-row';
  row.style.cssText = 'display: flex; gap: 8px; align-items: center; margin-bottom: 10px;';
  
  const cleanLabel = (label || '').replace(/"/g, '&quot;');
  const safeId = id || 'opt_' + Date.now().toString(36) + '_' + Math.random().toString(36).substring(2, 6);

  row.innerHTML = `
    <input type="hidden" class="opt-id" value="${safeId}">
    <input type="text" placeholder="اسم الخيار (مثلاً: حساب موثق)" class="opt-label" value="${cleanLabel}" style="flex: 2; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--ink); font-family: 'Tajawal'; font-size: 13px;" required>
    <input type="number" step="0.01" placeholder="السعر ($)" class="opt-price" value="${price}" style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--ink); font-family: 'Tajawal'; font-size: 13px;" required>
    <button type="button" style="background: var(--danger, #e5484d); color: white; border: none; border-radius: 8px; padding: 10px 12px; cursor: pointer; font-size: 13px;"><i class="fas fa-trash-can"></i></button>
  `;
  row.querySelector('button').addEventListener('click', () => row.remove());
  optionsBuilder.appendChild(row);
}

// تجميع الخيارات وتحويلها لمصفوفة
function collectOptions() {
  if (!hasOptionsToggle.checked) return [];
  const rows = optionsBuilder.querySelectorAll('.option-row');
  const options = [];

  rows.forEach((row) => {
    const id = row.querySelector('.opt-id').value;
    const label = row.querySelector('.opt-label').value.trim();
    const price = parseFloat(row.querySelector('.opt-price').value) || 0;
    if (label) {
      options.push({
        id: id,
        label: label,
        price_usd: price
      });
    }
  });

  return options;
}

async function loadCategories() {
  const { data } = await supabaseClient.from('categories').select('*').order('display_order');
  categories = data || [];
  categoryInput.innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

async function loadProducts() {
  const { data } = await supabaseClient
    .from('products').select('*, categories(name)').order('display_order');
  products = data || [];
  render();
}

function render() {
  const container = document.getElementById('productsList');
  if (products.length === 0) {
    container.innerHTML = `<div style="color:var(--text-muted); font-size:13px; text-align:center; padding:30px 0;">لا توجد منتجات بعد</div>`;
    return;
  }

  container.innerHTML = products.map(p => `
    <div class="manage-item">
      <div class="manage-item-thumb">
        ${p.image_url ? `<img src="${p.image_url}" alt="">` : 'لا صورة'}
      </div>
      <div class="manage-item-info">
        <div class="manage-item-name">
          ${p.name}
          ${!p.is_active ? '<span class="inactive-badge">مخفي</span>' : ''}
          ${Array.isArray(p.options) && p.options.length > 0 ? '<span class="inactive-badge" style="background:rgba(59,130,246,0.12); color:#3b82f6;">خيارات متعددة</span>' : ''}
        </div>
        <div class="manage-item-sub">${p.categories?.name || 'بدون تصنيف'} — $${p.price_usd}</div>
      </div>
      <div class="manage-item-actions">
        <button class="icon-action-btn" data-action="edit" data-id="${p.id}"><i class="fas fa-pen"></i></button>
        <button class="icon-action-btn" data-action="delete" data-id="${p.id}"><i class="fas fa-trash-can"></i></button>
      </div>
    </div>
  `).join('');

  container.querySelectorAll('[data-action="edit"]').forEach(btn => {
    btn.addEventListener('click', () => openForm(btn.dataset.id));
  });
  container.querySelectorAll('[data-action="delete"]').forEach(btn => {
    btn.addEventListener('click', () => deleteProduct(btn.dataset.id));
  });
}

function addFieldRow(key, label, placeholder = '') {
  const row = document.createElement('div');
  row.className = 'field-row';
  row.style.display = 'flex';
  row.style.gap = '10px';
  row.style.marginBottom = '12px';
  row.style.alignItems = 'center';
  
  const safeKey = key || 'field_' + Date.now() + Math.random().toString(36).substring(2, 5);

  row.innerHTML = `
    <input type="text" placeholder="العنوان فوق (مثال: ايدي اللاعب)" class="field-label" value="${label}" style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--ink); font-family: 'Tajawal'; font-size: 13px;">
    <input type="text" placeholder="الداخل الصندوق (مثال: ID)" class="field-placeholder" value="${placeholder}" style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--ink); font-family: 'Tajawal'; font-size: 13px;">
    <input type="hidden" class="field-key" value="${safeKey}">
    <button type="button" style="background: var(--danger); color: var(--white); border: none; border-radius: 8px; padding: 10px 14px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s;"><i class="fas fa-xmark"></i></button>
  `;
  row.querySelector('button').addEventListener('click', () => row.remove());
  fieldsBuilder.appendChild(row);
}

function openForm(id) {
  editingId = id;
  formError.textContent = '';
  fieldsBuilder.innerHTML = '';
  optionsBuilder.innerHTML = '';

  const fileBox = document.getElementById('fileUploadBox');

  if (id) {
    const p = products.find(x => x.id === id);
    document.getElementById('formModalTitle').textContent = 'تعديل المنتج';
    categoryInput.value = p.category_id || '';
    nameInput.value = p.name;
    descInput.value = p.description || '';
    instructionsInput.value = p.instructions || '';
    document.getElementById('imageInput').value = p.image_url || '';
    fileBox.textContent = p.image_url ? 'يوجد صورة مرفوعة (اضغط للتغيير)' : 'اضغط لرفع صورة';
    fileBox.classList.toggle('has-file', !!p.image_url);
    priceInput.value = p.price_usd;
    orderInput.value = p.display_order;
    activeInput.value = String(p.is_active);
    
    // تعبئة الخيارات الفرعية عند التعديل
    if (Array.isArray(p.options) && p.options.length > 0) {
      hasOptionsToggle.checked = true;
      toggleOptionsSection(true);
      p.options.forEach(opt => addOptionRow(opt.label, opt.price_usd ?? opt.price ?? '', opt.id));
    } else {
      hasOptionsToggle.checked = false;
      toggleOptionsSection(false);
    }

    (p.required_fields || []).forEach(f => addFieldRow(f.key, f.label, f.placeholder || ''));
  } else {
    document.getElementById('formModalTitle').textContent = 'منتج جديد';
    nameInput.value = '';
    descInput.value = '';
    instructionsInput.value = '';
    document.getElementById('imageInput').value = '';
    fileBox.textContent = 'اضغط لرفع صورة';
    fileBox.classList.remove('has-file');
    priceInput.value = '';
    orderInput.value = products.length;
    activeInput.value = 'true';

    hasOptionsToggle.checked = false;
    toggleOptionsSection(false);
  }

  formModal.classList.add('show');
}

function closeForm() {
  formModal.classList.remove('show');
  editingId = null;
}

function collectFields() {
  const rows = fieldsBuilder.querySelectorAll('.field-row');
  const fields = [];
  for (const row of rows) {
    const key = row.querySelector('.field-key').value.trim();
    const label = row.querySelector('.field-label').value.trim();
    const placeholder = row.querySelector('.field-placeholder').value.trim();
    if (label) {
      fields.push({ key, label, placeholder });
    }
  }
  return fields;
}

async function saveProduct() {
  const name = nameInput.value.trim();
  const price = parseFloat(priceInput.value);
  const categoryId = categoryInput.value;

  if (!name) { formError.textContent = 'أدخل اسم المنتج'; return; }
  if (!price || price <= 0) { formError.textContent = 'أدخل سعر صحيح للمنتج'; return; }
  if (!categoryId) { formError.textContent = 'اختر تصنيف'; return; }

  // التحقق من الخيارات الفرعية عند التفعيل
  if (hasOptionsToggle.checked) {
    const opts = collectOptions();
    if (opts.length < 2) {
      formError.textContent = 'عند تفعيل الخيارات الفرعية، يجب إضافة خيارين على الأقل.';
      return;
    }
  }

  const payload = {
    name,
    description: descInput.value.trim() || null,
    instructions: instructionsInput.value.trim() || null,
    image_url: imageInput.value.trim() || null,
    price_usd: price,
    category_id: categoryId,
    display_order: parseInt(orderInput.value) || 0,
    is_active: activeInput.value === 'true',
    required_fields: collectFields(),
    options: collectOptions(),
    has_options: hasOptionsToggle.checked && collectOptions().length > 0
  };

  const { error } = editingId
    ? await supabaseClient.from('products').update(payload).eq('id', editingId)
    : await supabaseClient.from('products').insert(payload);

  if (error) {
    formError.textContent = 'خطأ من قاعدة البيانات: ' + error.message;
    return;
  }

  closeForm();
  await loadProducts();
}

async function deleteProduct(id) {
  if (!confirm('متأكد عايز تحذف المنتج ده؟')) return;
  await supabaseClient.from('products').delete().eq('id', id);
  await loadProducts();
}

init();
</script>
</body>
</html>
